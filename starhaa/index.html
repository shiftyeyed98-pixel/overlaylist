<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=400, height=1080, initial-scale=1.0" />
  <title>플렉스TV 이안 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'YeogiOttaeJalnan';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/JalnanOTF00.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    :root {
      --w: 400px;
      --h: 1080px;
      --row-gap: 4px;
      --num-col: 72px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 50s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;

      /* ===== 고정 타이틀 영역 ===== */
      --fixed-title-h: 42px;  /* 타이틀이 차지하는 세로 영역 */
      --fixed-title-mb: 6px;  /* 타이틀과 리스트 사이 여백 */
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'YeogiOttaeJalnan', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .fixed-title-wrap {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: var(--fixed-title-h);
      z-index: 10;
      pointer-events: none;
      background: transparent;
    }

    .viewport {
      position: absolute;
      left: 0;
      top: calc(var(--fixed-title-h) + var(--fixed-title-mb));
      width: 100%;
      height: calc(100% - var(--fixed-title-h) - var(--fixed-title-mb));
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: center;
    }

    td.label {
      padding-left: 4px;
    }

    .page-title {
      width: 200px;
      height: 36px;
      line-height: 36px;
      margin: 0;
      text-align: center;
      font-family: 'YeogiOttaeJalnan', Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      border-radius: 40px;
      box-sizing: border-box;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .title-pink {
      background: #F499C4;
    }

    .title-blue {
      background: #8fd0ff;
    }

    .title-yellow {
      background: #F6E58D;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: auto;
    }

    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      object-fit: contain;
      display: block;
      margin-left: -3px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <!-- 타이틀은 스크롤 트랙 밖에 배치해서 항상 상단에 고정 -->
    <div class="fixed-title-wrap">
      <div class="page-title title-pink">이안ꕤ 시그</div>
    </div>

    <!-- 숫자 / 텍스트 / 아이콘만 이 영역 안에서 무한 순환 -->
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_1 = [
      ['55','뽁뽁이'],
      ['70','귀여워서 미안해'],
      ['80','외모체크'],
      ['85','캐치캐치','new'],
      ['93','역도'],
      ['106','오빠바이러스'],
      ['107','나랑 사귈래'],
      ['118','바람피면 D지는거야'],
      ['131','뱅뱅뱅'],
      ['135','카리나닮았대'],
      ['143','내얘길 들어봐'],
      ['149','너와의 모든 지금'],
      ['151','바니바니'],
      ['155','아이스크림'],
      ['157','마티니'],
      ['158','라라리라라','best'],
      ['161','핑크레이디'],
      ['163','업'],
      ['165','러브쉐이크'],
      ['168','모시모시'],
      ['171','쌔끈빠끈'],
      ['175','너뿐이야'],
      ['181','날라리'],
      ['188','자기야 화풀어'],
      ['191','이머전시'],
      ['221','뚜뚜뚜뚜'],
      ['235','빛을 따라서'],
      ['241','럽미모어'],
      ['251','NANANA'],
      ['257','WHF'],
      ['258','로드잭'],
      ['272','간바레센빠이'],
      ['273','바비걸'],
      ['281','야메떼'],
      ['282','예쁜게죄','best'],
      ['284','센세'],
      ['305','제로투'],
      ['306','L.S.D'],
      ['313','퀸즈'],
      ['325','그래비티'],
      ['344','우유'],
      ['351','RICH MAN'],
      ['355','터미널','best'],
      ['364','섹시퀸'],
      ['365','물개'],
      ['369','계엄령'],
      ['373','BEGGIN`','best'],
      ['375','사탄들렸어'],
      ['393','I WANT YOU'],
      ['411','겐또'],
      ['414','달빛에 그려지는'],
      ['417','헨타이'],
      ['418','오빠하앙','best'],
      ['420','리듬타'],
      ['555','누나가 알려줄게'],
      ['588','니 엉덩이에ㅎ']
    ];

    const FONT = 'YeogiOttaeJalnan, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
    const ICON_NEW = 'https://i.imgur.com/a5s2iUL.png';
    const ICON_BEST = 'https://i.imgur.com/1Z3VEON.png';
    const ICON_Rullet = 'https://i.imgur.com/BfBWx6n.png';

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="1" dy="1" stdDeviation="3.2" flood-color="#ffffff" flood-opacity="0.9"/>
          </filter>
        </defs>`;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'pink') {
      const width = numWidth(num.length);
      const cx = width / 2;
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      /* 글꼴색 */
      const fillColor =
        variant === 'blue' ? '#8fd0ff' :
        variant === 'yellow' ? '#F6E58D' :
        '#EFA4BF';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.95 1)">
          <text x="${cx}" y="25"
            text-anchor="middle"
            font-family="${FONT}"
            font-size="28"
            font-weight="700"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 500) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      return Math.ceil(ctx.measureText(text).width);
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 500);
      const w = Math.max(40, measured + 10); // 여백 10 정도
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="label-svg" viewBox="0 0 ${w} 34"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.95 1)">
            <text x="4" y="25"
              text-anchor="start"
              font-family="${FONT}"
              font-size="28"
              font-weight="500"
              stroke="#26080B"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    function makeLabelIcon(type) {
      let src = '';
      let alt = '';

      if (type === 'new') {
        src = ICON_NEW;
        alt = 'NEW';
      } else if (type === 'best') {
        src = ICON_BEST;
        alt = 'BEST';
      } else if (type === 'rullet') {
        src = ICON_Rullet;
        alt = 'RULLET';
      } else {
        return '';
      }

      return `<img class="label-icon" src="${src}" alt="${alt}">`;
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, label, iconType = '']) => `
              <tr>
                <td class="num">${makeNumberSVG(num, numberVariant)}</td>
                <td class="label">
                  <div class="label-wrap">
                    <div class="label-text">${makeLabelSVG(label)}</div>
                    ${makeLabelIcon(iconType)}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makePage(rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}">
          ${makeTable(rows, variant)}
        </div>`;
    }

    function makeSequenceHTML() { 
      return `
        ${makePage(PAGE_1, 'pink', 'page-1')}
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
</body>
</html>
