<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=400, height=600, initial-scale=1.0" />
  <title>OBS 오버레이 - 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'NationalPension';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/NPSfontBold.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
    }

    :root {
      --w: 400px;
      --h: 600px;
      --row-gap: 4px;
      --num-col: 72px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 50s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'NationalPension', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 10px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: center;
    }

    td.label {
      padding-left: 4px;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: 100%;
      height: var(--svg-h);
      overflow: visible;
    }


    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_1 = [
      ["67","xonada"],
      ["68","Rock you baby"],
      ["69","킹받으면 좋겠어"],
      ["70","삐끼삐끼"],
      ["71","See봐 레쓰고"],
      ["72","베이프"],
      ["74","냥냥냥"],
      ["75","마티니🔥"],
      ["76","팬서비스"],
      ["77","패스트카"],
      ["78","외모체크"],
      ["79","바나나차차"],
      ["80","티모송"],
      ["81","바람피면 D지는거야"],
      ["82","러브쉐이크"],
      ["83","자기야 화풀어"],
      ["91","핑크레이디"],
      ["92","나랑사귈래"],
      ["93","슈퍼그럼요"],
      ["94","솜사탕"],
      ["95","라부부"],
      ["96","바나나알러지원숭이🆕"],
      ["97","모시모시🆕"],
      ["110","왜요왜요🔥"],
      ["115","바우치🔥"],
      ["120","홀드업"],
      ["130","엉큰녀"],
      ["140","터미널🔥"],
      ["150","계엄령"],
      ["160","L.S.D"],
      ["180","제로투"],
      ["200","우유"],
      ["210","간바레 센빠이"],
      ["220","아로아로"]
    ];
   const PAGE_2 = [
      ["73","스키🔥"],
      ["90","역도🔥"],
      ["98","앙카🔥"]
    ];

    const FONT = 'NationalPension, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#ffffff" flood-opacity="1"/>
          </filter>
        </defs>`;
    }


    /* 단가 */
    function makeNumberSVG(num, variant = 'pink') {
      const width = numWidth(num.length);
      const cx = width / 2;
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      const fillColor = variant === 'blue' ? '#8fd0ff' : '#ff5fa2';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
          <text x="${cx}" y="25"
            text-anchor="middle"
            font-family="${FONT}"
            font-size="28"
            font-weight="700"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function makeLabelSVG(label) {
      const t = esc(label);
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;
      return `
        <svg class="label-svg" viewBox="0 0 172 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img" preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
          <text x="4" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="28"
            font-weight="700"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, label]) => `
              <tr>
                <td class="num">${makeNumberSVG(num, numberVariant)}</td>
                <td class="label">${makeLabelSVG(label)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makeSequenceHTML() { /*페이지 정리*/
      return `
        <div class="page page-1">${makeTable(PAGE_1, 'pink')}</div>
        <div class="page-gap" aria-hidden="true"></div>
        <div class="page page-2">${makeTable(PAGE_2, 'blue')}</div>
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
</body>
</html>
