<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=320, height=1080, initial-scale=1.0" />
  <title>플렉스TV 빛베리⋰˚☆ 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'CookieRun';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.0/CookieRunOTF-Bold00.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'GMarketSans';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
        font-weight: 500;
        font-display: swap;
    }

    :root {
      --w: 320px;
      --h: 1080px;
      --row-gap: 4px;
      --icon-col: 34px;
      --num-col: 80px;
      --num-icon-size: 22px;
      --svg-h: 30px;
      --page-gap: 10px;
      --loop-seconds: 60s;
      --sequence-height: 1000px;
      --outline: 5;

      /* ===== 고정 타이틀 영역 ===== */
      --fixed-title-h: 36px;
      --fixed-title-mb: 2px;
  
      /* ===== 고정 페이지 영역 ===== */
      --fixed-page-side-gap: 0px; /* ← 원하는 값 */
      --fixed-page-h: 0px;

      /* ===== 하단 고정바 제작자 영역 ===== */
      --fixed-bottom-h: 20px;
      --fixed-bottom-bottom: 4px;
      --fixed-bottom-mt: 0px;
    }


    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'CookieRun', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
    }

    .fixed-title-wrap {
      position: absolute;
      left: 4px;
      top: 4px;
      width: calc(100% - 8px);
      height: var(--fixed-title-h);
      z-index: 10;
      pointer-events: none;
      background: transparent;
    }
    
    .viewport {
      position: absolute;
      left: 4px;
      top: calc(var(--fixed-title-h) + var(--fixed-title-mb));
      width: calc(100% - 4px);
      height: calc(
        100%
        - var(--fixed-title-h)
        - var(--fixed-title-mb)
        - var(--fixed-bottom-h)
        - var(--fixed-bottom-bottom)
        - var(--fixed-page-h)
      );
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 0;
    }

    tbody tr:not(.footnote-row) td {
      padding-bottom: var(--row-gap);
    }

    .footnote-row td {
      padding-top: 0;
      padding-bottom: 2px;
    }


    col.num-col { width: var(--num-col); }
    col.icon-col { width: var(--icon-col); }

    td {
      padding-left: 2px;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: left;
    }

    .num-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      width: max-content;
      height: var(--svg-h);
    }

    .num-left-icon {
      padding-left: 2px;
      width: var(--num-icon-size);
      height: var(--num-icon-size);
      flex: 0 0 var(--num-icon-size);
      object-fit: contain;
      display: block;
      margin: 0;

        /* 검정 외곽선 */
      filter:
        drop-shadow(0 0 1px #000)
        drop-shadow(1px 0 0 #000)
        drop-shadow(-1px 0 0 #000)
        drop-shadow(0 1px 0 #000)
        drop-shadow(0 -1px 0 #000);
    }

    td.label {
      padding-left: 4px;
    }

    td.icon-cell {
      width: 34px;
      text-align: left;
      vertical-align: middle;
    }

    td.footnote {
      padding: 0 0 0 6px;
      white-space: nowrap;
      line-height: 1;
    }

    .page-title {
      width: 240px;
      height: 36px;

      display: flex;
      align-items: center;       /* 세로 중앙 */
      justify-content: center;   /* 가로 중앙 */

      margin: 0 0 6px 0;
      text-align: center;

      font-family: 'CookieRun', Arial, sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: #ffffff;

      border: 2px solid currentColor;
      border-radius: 10px;
      box-sizing: border-box;

      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
         
      transform: translateY(-1px);
    }

    .title-gray {
      background: #bfbfbf;
      border-color: #262525;
    }

    .title-pink {
      background: #FAB0C1;
      border-color: #D36C86;
    }

    .title-orange {
      background: #EF9573;
      border-color: #C96541;
    }

    .title-yellow {
      background: #FEFA94;
      border-color: #D4BE36;
    }

    .title-purple {
      background: #9656bd;
      border-color: #7727a8;
    }

    .title-blue {
      background: #4A90E2;
      border-color: #1F5EA6;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: auto;
    }
    
    .num-svg,
    .label-svg,
    .footnote-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      object-fit: contain;
      display: block;
      margin-left: -6px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }

    .fixed-bottom-label {
      position: absolute;
      left: 4px;
      bottom: var(--fixed-bottom-bottom);
      width: 245px;
      height: var(--fixed-bottom-h);

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'GMarketSans', Arial, sans-serif;
      font-size: 10px;
      font-weight: 100;
      color: #ffffff;

      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #ffffff;
      border-radius: 10px;

      box-sizing: border-box;
      z-index: 50;

      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000;
    }

/*    .page2 .label-svg text {
      font-size: 22px !important;
    }

    .page2 .num-svg text {
      font-size: 22px !important;
    }
*/

    .e-colorshift text {
      animation: colorShift 1.6s linear infinite;
    }

    @keyframes colorShift {
      0%   { fill: #ff6; }
      33%  { fill: #6ff; }
      66%  { fill: #f6f; }
      100% { fill: #ff6; }
    }

    @keyframes riseLoop {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(0, calc(-1 * var(--sequence-height)), 0);
      }
    }

    .fixed-bottom-page {
      position: absolute;
      left: var(--fixed-page-side-gap);
      bottom: calc(var(--fixed-bottom-h) + var(--fixed-bottom-bottom) + 0px);
      width: calc(78% - (var(--fixed-page-side-gap) * 2));  /* 고정 페이지 유리효과 가로 폭사이즈 */

      z-index: 40;

      padding: 4px 4px 4px 4px;

      border-radius: 14px;

      background: rgba(60, 60, 60, 0.35); /* 안정적인 값 */
      border: 1px solid rgba(255,255,255,0.4);
      box-sizing: border-box;
    }

    /* 지원되는 환경에서만 blur 적용 */
    @supports (backdrop-filter: blur(2px)) or (-webkit-backdrop-filter: blur(2px)) {
      .fixed-bottom-page {
        background: rgba(120, 120, 120, 0.18);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
    }
  }

    .waveChar {
      display: inline-block;
      animation: wave 1s ease-in-out infinite;
    }

    @keyframes wave {
      50% {
        transform: translateY(-6px);
      }
    }

  </style>
</head>
<body>
  <div class="overlay">
    <!-- 타이틀은 스크롤 트랙 밖에 배치해서 항상 상단에 고정 -->
    <div class="fixed-title-wrap">
      <div class="page-title title-pink"> 빛베리⋰˚☆ </div>
    </div>

    <!-- 숫자 / 텍스트 / 아이콘만 이 영역 안에서 무한 순환 -->
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
    <div id="fixedPage" class="fixed-bottom-page"></div>
    <div class="fixed-bottom-label">designed by 시프티♻️</div>
  </div>

  <script>
      /* =========================
        우클릭 / 개발자도구 차단
      ========================= */

      // 우클릭 차단
      document.addEventListener('contextmenu', e => {
        e.preventDefault();
      });

      // 드래그 선택 차단
      document.addEventListener('selectstart', e => {
        e.preventDefault();
      });

      // 드래그 차단
      document.addEventListener('dragstart', e => {
        e.preventDefault();
      });

      // 개발자도구 단축키 차단
      document.addEventListener('keydown', e => {

        // F12
        if (e.key === 'F12') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
          e.preventDefault();
          return false;
        }

        // Ctrl+U
        if (e.ctrlKey && e.key.toLowerCase() === 'u') {
          e.preventDefault();
          return false;
        }

        // Ctrl+S
        if (e.ctrlKey && e.key.toLowerCase() === 's') {
          e.preventDefault();
          return false;
        }

      });

      // DevTools 열림 감지
      setInterval(() => {
        const devtoolsOpen =
          window.outerWidth - window.innerWidth > 160 ||
          window.outerHeight - window.innerHeight > 160;

        if (devtoolsOpen) {
          document.body.innerHTML = '';
        }
      }, 1000);

    let PAGE_DATA = {};

    const FONT = 'CookieRun, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
//    const ICON_PUNG_P1 = 'https://i.imgur.com/qGz1W0y.png'; //프로필 (회색)
//    const ICON_PUNG_P2 = 'https://i.imgur.com/D0ldyfG.png'; //미션판 (주황)
//    const ICON_PUNG_P3 = 'https://i.imgur.com/12lhyTv.png'; //운동 (노랑)
//    const ICON_PUNG_P4 = 'https://i.imgur.com/IijYbRn.png'; //라이브 보라
      const ICON_PUNG_P5 = 'https://i.imgur.com/2PvVhKn.png'; //시그리액션(빨강)
//    const ICON_PUNG_P6 = 'https://i.imgur.com/cBt4rIi.png'; //열혈시그

    const PAGE_ICON_MAP = {
//      'page1': ICON_PUNG_P1,
//      'page2': ICON_PUNG_P2,
//      'page3': ICON_PUNG_P3,
//      'page4': ICON_PUNG_P4,
        'page1': ICON_PUNG_P5,
        'page2': ICON_PUNG_P5
//      'page3': ICON_PUNG_P4
    };

    const ICON_NEW = 'https://i.imgur.com/a5s2iUL.png';
    const ICON_BEST = 'https://i.imgur.com/1Z3VEON.png';
    const ICON_Rullet = 'https://i.imgur.com/hVpuiwV.png';
    const FIXED_PAGE_KEY = 'page3'; 
    // 'page1', 'page2', 'page3', 'page4' , null 

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxpC4Xf0_Sj5FTBFugnCSQ6j_H2tjifH2Ky0_dR-SEuzzWVtVn-mxO3O37uwE9MAGoTKQ/exec';

    async function loadSheetData() {

      const res = await fetch(GAS_URL);
      const data = await res.json();

      PAGE_DATA = {};

      Object.entries(data)

        // 빈 페이지 제거
        .filter(([_, rows]) => rows.length > 0)

        .forEach(([pageKey, rows]) => {

          PAGE_DATA[pageKey] = {
            title:
              pageKey === 'page1' ? '시그니처' :
              pageKey === 'page2' ? '미션' :
              pageKey === 'page3' ? '방셀' :
              pageKey,

            rows: rows
          };

        });

    }

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="0.0" flood-color="#ffffff" flood-opacity="0"/>
          </filter>
        </defs>`;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'purple') {
      const width = numWidth(num.length);
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      const fillColor =
        variant === 'gray' ? '#bfbfbf' :
        variant === 'pink' ? '#FAB0C1' :
        variant === 'orange' ? '#EF9573' :
        variant === 'yellow' ? '#FEFA94' :
        variant === 'blue' ? '#4A90E2' : 
        '#DCAEF8';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
          <text x="14" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="28"
            font-weight="300"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 300) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      return Math.ceil(ctx.measureText(text).width);
    }

    function makeLabelSVG(label, effect = '') {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 300);
      const w = Math.max(40, measured + 10);

      const filterId =
        `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg
          class="label-svg ${effect === 'e_colorshift' ? 'e-colorshift' : ''}"
          viewBox="0 0 ${w} 34"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="${t}"
          role="img"
          preserveAspectRatio="xMinYMid meet">

          ${makeShadowFilter(filterId)}

          <g transform="scale(0.9 1)">
            <text
              x="16"
              y="28"
              text-anchor="start"
              font-family="${FONT}"
              font-size="28"
              font-weight="300"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }

    /* 각주 */
    function makeFootnoteSVG(footnote) {
      const t = esc(footnote);
      const measured = measureTextWidth(footnote, 20, FONT, 300);
      const w = Math.max(40, measured + 10);
      const filterId = `footnoteShadow-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="footnote-svg" viewBox="0 0 ${w} 30"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
            <text x="98" y="10"
              text-anchor="start"
              font-family="${FONT}"
              font-size="20"
              font-weight="300"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    /* 숫자 좌측 하트 이미지 */
    function makeNumberIcon(pageClass) {
      const src = PAGE_ICON_MAP[pageClass] || '';
      return src ? `<img class="num-left-icon" src="${src}" alt="풍">` : '';
    }

    /* 아이콘 */
    function makeLabelIcon(type) {
      let src = '';
      let alt = '';

      if (type === 'new') {
        src = ICON_NEW;
        alt = 'NEW';
      } else if (type === 'best') {
        src = ICON_BEST;
        alt = 'BEST';
      } else if (type === 'rullet') {
        src = ICON_Rullet;
        alt = 'RULLET';
      } else {
        return '';
      }

      return `<img class="label-icon" src="${src}" alt="${alt}">`;
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'purple', pageClass = '') {
      const bodyHTML = rows.map(([num, label, iconType = '', footnote = '', effect = '']) => {
        const safeNum = String(num ?? '').trim();
        const safeLabel = String(label ?? '').trim();
        const safeFootnote = String(footnote ?? '').trim();

        const mainRow = `
          <tr>
            <td class="num">
              ${safeNum ? `<div class="num-wrap">${makeNumberIcon(pageClass)}${makeNumberSVG(safeNum, numberVariant)}</div>` : ''}
            </td>
            <td class="label">
              <div class="label-wrap">
                <div class="label-text">${safeLabel ? makeLabelSVG(safeLabel, effect) : ''}</div>
              </div>
            </td>
            <td class="icon-cell">${makeLabelIcon(iconType)}</td>
          </tr>`;

        const footnoteRow = safeFootnote
          ? `
          <tr class="footnote-row">
            <td class="footnote" colspan="3">${makeFootnoteSVG(safeFootnote)}</td>
          </tr>`
          : '';

        return mainRow + footnoteRow;
      }).join('');

      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
            <col class="icon-col" />
          </colgroup>
          <tbody>
            ${bodyHTML}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}" data-page="${pageClass}">
          <div class="page-title ${titleClass}">${title}</div>
          ${makeTable(rows, variant, pageClass)}
        </div>`;
    }

    function makeSequenceHTML() {
      return Object.entries(PAGE_DATA)
        .map(([pageKey, pageObj]) => `
          ${makePage(
            pageObj.title,
            'title-pink',
            pageObj.rows,
            'pink',
            pageKey
          )}
          <div class="page-gap" aria-hidden="true"></div>
        `)
        .join('');
    }

    function extractFixedPage() {
      if (!FIXED_PAGE_KEY) return; // ← 추가
      const fixedContainer = document.getElementById('fixedPage');

      // sequenceA 기준으로 찾기
      const target = sequenceA.querySelector(`[data-page="${FIXED_PAGE_KEY}"]`);

      if (!target) return;

      // 복제해서 고정 영역으로 이동
      fixedContainer.innerHTML = target.outerHTML;

      // 스크롤에서 제거 (A/B 둘 다 제거)
      [sequenceA, sequenceB].forEach(seq => {
        const el = seq.querySelector(`[data-page="${FIXED_PAGE_KEY}"]`);
        if (!el) return;

        const next = el.nextElementSibling;

        el.remove();

        // 바로 다음이 gap이면 그것만 제거
        if (next && next.classList.contains('page-gap')) {
          next.remove();
        }
      });
    }

    function applyWaveToFixedTitle() {
      if (!FIXED_PAGE_KEY) return;

      const fixedContainer = document.getElementById('fixedPage');
      const titleEl = fixedContainer.querySelector('.page-title');

      if (!titleEl) return;

      const text = titleEl.textContent.trim();

      // 글자 단위로 쪼개서 span 적용
      titleEl.innerHTML = [...text].map((c, i) =>
        `<span class="waveChar" style="animation-delay:${i * 0.08}s">${c}</span>`
      ).join('');
    }

    function adjustViewportHeight() {
      const vh = document.querySelector('.viewport');

      if (!FIXED_PAGE_KEY) {
        document.documentElement.style.setProperty('--fixed-page-h', `0px`);
        return;
      }

      const fixed = document.getElementById('fixedPage');
      const h = fixed.offsetHeight || 0;

      document.documentElement.style.setProperty('--fixed-page-h', `${h}px`);
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    
    async function init() {

      await loadSheetData();

      sequenceA.innerHTML = makeSequenceHTML();
      sequenceB.innerHTML = makeSequenceHTML();

      extractFixedPage();

      applyWaveToFixedTitle();

      adjustViewportHeight();

      if (!FIXED_PAGE_KEY) {
        document.getElementById('fixedPage').style.display = 'none';
      }

      updateLoopHeight();
    }

    init();

    if (!FIXED_PAGE_KEY) {
      document.getElementById('fixedPage').style.display = 'none';
    }

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
</body>
</html>
