<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=400, height=1080, initial-scale=1.0" />
  <title> Flex tv 미밍 :::: (너비400, 높이1080) </title>
  <style>

    @font-face {
        font-family: 'YeogiOttaeJalnan';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/JalnanOTF00.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'CookieRun';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.0/CookieRunOTF-Bold00.woff') format('woff');
        font-weight: 700;
        font-display: swap;
    }

    @font-face {
        font-family: 'GMarketSans';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
        font-weight: 500;
        font-display: swap;
    }

    :root {
      --w: 400px;
      --h: 1080px;
      --row-gap: 4px;
      --icon-col: 34px;
      --num-col: 80px;
      --num-icon-size: 22px;
      --svg-h: 30px;
      --page-gap: 10px;
      --loop-seconds: 60s;
      --sequence-height: 1000px;
      --outline: 5;

      /* ===== 고정 타이틀 영역 ===== */
      --fixed-title-h: 36px;
      --fixed-title-mb: 2px;
  
      /* ===== 고정 페이지 영역 ===== */
      --fixed-page-side-gap: 0px; /* ← 원하는 값 */
      --fixed-page-h: 0px;

      /* ===== 하단 고정바 제작자 영역 ===== */
      --fixed-bottom-h: 20px;
      --fixed-bottom-bottom: 4px;
      --fixed-bottom-mt: 0px;
    }


    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'YeogiOttaeJalnan', 'CookieRun', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
    }

    .fixed-title-wrap {
      position: absolute;
      left: 4px;
      top: 4px;
      width: calc(100% - 8px);
      height: var(--fixed-title-h);
      z-index: 10;
      pointer-events: none;
      background: transparent;
    }
    
    .viewport {
      position: absolute;
      left: 4px;
      top: calc(var(--fixed-title-h) + var(--fixed-title-mb));
      width: calc(100% - 4px);
      height: calc(
        100%
        - var(--fixed-title-h)
        - var(--fixed-title-mb)
        - var(--fixed-bottom-h)
        - var(--fixed-bottom-bottom)
        - var(--fixed-page-h)
      );
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 0;
    }

    tbody tr:not(.footnote-row) td {
      padding-bottom: var(--row-gap);
    }

    .footnote-row td {
      padding-top: 0;
      padding-bottom: 2px;
    }


    col.num-col { width: var(--num-col); }
    col.icon-col { width: var(--icon-col); }

    td {
      padding-left: 2px;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: left;
    }

    .num-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      width: max-content;
      height: var(--svg-h);
    }

    .num-left-icon {
      padding-left: 2px;
      width: var(--num-icon-size);
      height: var(--num-icon-size);
      flex: 0 0 var(--num-icon-size);
      position: relative;
      top: -4px;
      object-fit: contain;
      display: block;
      margin: 0;

        /* 검정 외곽선 */
      filter:
        drop-shadow(0 0 1px #000)
        drop-shadow(1px 0 0 #000)
        drop-shadow(-1px 0 0 #000)
        drop-shadow(0 1px 0 #000)
        drop-shadow(0 -1px 0 #000);
    }

    td.label {
      padding-left: 4px;
    }

    td.icon-cell {
      width: 34px;
      text-align: left;
      vertical-align: middle;
    }

    td.footnote {
      padding: 0 0 0 6px;
      white-space: nowrap;
      line-height: 1;
    }

    .page-title {
      width: 240px;
      height: 36px;

      display: flex;
      align-items: center;       /* 세로 중앙 */
      justify-content: center;   /* 가로 중앙 */

      margin: 0 0 6px 0;
      text-align: center;

      font-family: 'YeogiOttaeJalnan', 'CookieRun', Arial, sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: #ffffff;

      border: 2px solid currentColor;
      border-radius: 10px;
      box-sizing: border-box;

      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
         
      transform: translateY(-1px);
    }

    .title-gray {
      background: #bfbfbf;
      border-color: #262525;
    }

    .title-pink {
      background: #FAB0C1;
      border-color: #D36C86;
    }

    .title-orange {
      background: #EF9573;
      border-color: #C96541;
    }

    .title-yellow {
      background: #FEFA94;
      border-color: #D4BE36;
    }

    .title-purple {
      background: #9656bd;
      border-color: #7727a8;
    }

    .title-blue {
      background: #4A90E2;
      border-color: #1F5EA6;
    }

    .title-green {
      background: #8acf6d;
      border-color: #4DAF2A;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: auto;
    }
    
    .num-svg,
    .label-svg,
    .footnote-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      object-fit: contain;
      display: block;
      margin-left: 12px; /* 텍스트와 아이콘 사이간격 */
    }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }

    .fixed-bottom-label {
      position: absolute;
      left: 4px;
      bottom: var(--fixed-bottom-bottom);
      width: 245px;
      height: var(--fixed-bottom-h);

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'GMarketSans', Arial, sans-serif;
      font-size: 10px;
      font-weight: 100;
      color: #ffffff;

      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #ffffff;
      border-radius: 10px;

      box-sizing: border-box;
      z-index: 50;

      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000;
    }

/*    .page2 .label-svg text {
      font-size: 22px !important;
    }

    .page2 .num-svg text {
      font-size: 22px !important;
    }
*/

    .e-colorshift text {
      animation: colorShift 1.6s linear infinite;
    }

    @keyframes colorShift {
      0%   { fill: #ff6; }
      33%  { fill: #6ff; }
      66%  { fill: #f6f; }
      100% { fill: #ff6; }
    }

    @keyframes riseLoop {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(0, calc(-1 * var(--sequence-height)), 0);
      }
    }

    .fixed-bottom-page {
      position: absolute;
      left: var(--fixed-page-side-gap);
      bottom: calc(var(--fixed-bottom-h) + var(--fixed-bottom-bottom) + 0px);
      width: calc(78% - (var(--fixed-page-side-gap) * 2));  /* 고정 페이지 유리효과 가로 폭사이즈 */

      z-index: 40;

      padding: 4px 4px 4px 4px;

      border-radius: 14px;

      background: rgba(60, 60, 60, 0.35); /* 안정적인 값 */
      border: 1px solid rgba(255,255,255,0.4);
      box-sizing: border-box;
    }

    /* 지원되는 환경에서만 blur 적용 */
    @supports (backdrop-filter: blur(2px)) or (-webkit-backdrop-filter: blur(2px)) {
      .fixed-bottom-page {
        background: rgba(120, 120, 120, 0.18);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
    }
  }

    .waveChar {
      display: inline-block;
      animation: wave 1s ease-in-out infinite;
    }

    @keyframes wave {
      50% {
        transform: translateY(-6px);
      }
    }

  </style>
</head>
<body>
  <div class="overlay">
    <!-- 타이틀은 스크롤 트랙 밖에 배치해서 항상 상단에 고정 -->
    <div class="fixed-title-wrap">
      <div class="page-title title-green"> 미밍♻️ Menu </div>
    </div>

    <!-- 숫자 / 텍스트 / 아이콘만 이 영역 안에서 무한 순환 -->
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
    <div id="fixedPage" class="fixed-bottom-page"></div>
    <div class="fixed-bottom-label">Designed by 시프티♻️</div>
  </div>

  <script>
      /* =========================
        우클릭 / 개발자도구 차단
      ========================= */

      // 우클릭 차단
      document.addEventListener('contextmenu', e => {
        e.preventDefault();
      });

      // 드래그 선택 차단
      document.addEventListener('selectstart', e => {
        e.preventDefault();
      });

      // 드래그 차단
      document.addEventListener('dragstart', e => {
        e.preventDefault();
      });

      // 개발자도구 단축키 차단
      document.addEventListener('keydown', e => {

        // F12
        if (e.key === 'F12') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
          e.preventDefault();
          return false;
        }

        // Ctrl+U
        if (e.ctrlKey && e.key.toLowerCase() === 'u') {
          e.preventDefault();
          return false;
        }

        // Ctrl+S
        if (e.ctrlKey && e.key.toLowerCase() === 's') {
          e.preventDefault();
          return false;
        }

      });

    let PAGE_DATA = {};

    const FONT = 'YeogiOttaeJalnan, CookieRun, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
//    const ICON_PUNG_P1 = 'https://i.imgur.com/qGz1W0y.png'; //프로필 (회색)
//    const ICON_PUNG_P2 = 'https://i.imgur.com/D0ldyfG.png'; //미션판 (주황)

      const ICON_PUNG_P5 = 'https://i.imgur.com/2PvVhKn.png'; //빨강
      const ICON_PUNG_P6 = 'https://i.imgur.com/cBt4rIi.png'; //파랑

    const PAGE_ICON_MAP = {
        'page1': ICON_PUNG_P5,
        'page2': ICON_PUNG_P6
    };

    const FIXED_PAGE_KEY = 'page4';

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgvFNXESd_WugYTQ8T2GRU9Nn5t31mhXK18i3wAnX2sGCUmEnUZ5o-ZtimNdM4KqJH/exec';
    // GAS Ver 0.3 사용

    async function loadSheetData() {

      const res = await fetch(GAS_URL);
      const data = await res.json();

      PAGE_DATA = Object.fromEntries(
        Object.entries(data).filter(([_, pageObj]) =>
          pageObj.rows &&
          pageObj.rows.length > 0 &&
          pageObj.enabled !== false
        )
      );

    }

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="0.0" flood-color="#ffffff" flood-opacity="0"/>
          </filter>
        </defs>`;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'purple') {
      const width = numWidth(num.length);
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

    const COLOR_MAP = {
      gray: '#bfbfbf',
      pink: '#FAB0C1',
      orange: '#EF9573',
      yellow: '#FEFA94',
      blue: '#4A90E2',
      purple: '#DCAEF8',
      green: '#8acf6d',
      red: '#ff6b6b'
    };

    const fillColor = COLOR_MAP[variant] || COLOR_MAP.blue;

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
          <text x="10" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="28"
            font-weight="300"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    const textWidthCache = {};

    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 300) {

      const key = `${text}_${fontSize}_${fontWeight}`;

      if (textWidthCache[key]) {
        return textWidthCache[key];
      }

      const canvas =
        measureTextWidth.canvas ||
        (measureTextWidth.canvas = document.createElement('canvas'));

      const ctx = canvas.getContext('2d');

      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;

      const width = Math.ceil(ctx.measureText(text).width);

      textWidthCache[key] = width;

      return width;
    }

    function makeLabelSVG(label, effect = '') {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 300);
      const w = Math.max(40, measured + 10);

      const filterId =
        `numShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg
          class="label-svg ${effect === 'e_colorshift' ? 'e-colorshift' : ''}"
          viewBox="0 0 ${w} 34"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="${t}"
          role="img"
          preserveAspectRatio="xMinYMid meet">

          ${makeShadowFilter(filterId)}

          <g transform="scale(0.9 1)">
            <text
              x="40"
              y="28"
              text-anchor="start"
              font-family="${FONT}"
              font-size="28"
              font-weight="300"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }

    /* 각주 */
    function makeFootnoteSVG(footnote) {
      const t = esc(footnote);
      const measured = measureTextWidth(footnote, 20, FONT, 300);
      const w = Math.max(40, measured + 10);
      const filterId = `footnoteShadow-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="footnote-svg" viewBox="0 0 ${w} 30"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
            <text x="120" y="18"
              text-anchor="start"
              font-family="${FONT}"
              font-size="22"
              font-weight="300"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    /* 숫자 좌측 하트 이미지 */
    function makeNumberIcon(pageClass) {
      const src = PAGE_ICON_MAP[pageClass] || '';
      return src ? `<img class="num-left-icon" src="${src}" alt="풍">` : '';
    }

    /* 아이콘 SVG 이미지 내장*/

    const SVG_ICONS = {
      new: `

          clip-rule="evenodd"

            <path id="svg_3" fill="#007fff" transform="rotate(-179.944 356.129 256.133)" d="m141.13016,31.65891l-122.87801,237.26496l122.87801,214.36432l520.30059,0c16.37799,0.16067 30.1189,-20.58463 32.48242,-48.04382l0,-353.97391c0.31106,-27.42934 -12.47444,-49.21902 -29.06629,-49.61153l-523.71672,0l0,-0.00001l0,-0.00001z"/>
            <path id="svg_4" fill="#ffffff" d="m138.50534,428.06201l-46.42645,-145.82738l-1.14025,0l0,145.82738l-56.96705,0l0,-337.55963l53.55042,0l46.42645,145.82349l1.14025,0l0,-145.82349l56.96705,0l0,337.55963l-53.55042,0zm195.96801,-127.46308l-56.96702,0l0,41.0489l69.78401,0l0,86.4142l-126.75106,0l0,-337.55963l125.32831,0l-7.1219,86.41421l-61.23936,0l0,45.36922l56.96702,0l0,78.31311l0,-0.00001zm197.10621,-210.09654l59.53001,0l-27.91441,337.55963l-74.34088,0l-13.10356,-124.22187l-3.41869,0l-12.81697,124.22187l-74.34088,0l-27.91441,-337.55963l59.53001,0l13.38813,188.49104l1.70934,0l20.5059,-188.49104l43.58096,0l20.22342,188.49104l1.70934,0l13.67267,-188.49104l0.00002,0z"/>
          </g>
        </g>
      </svg>`,

      best:`
        <svg xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 122.88 122.88"
          xml:space="preserve"

          focusable="false"
          preserveAspectRatio="xMidYMid meet">
          <g>
            <title>Layer 1</title>

    function makeNewIconSVG() {
      return SVG_ICONS.new;
    }

    function makeBestIconSVG() {
      return SVG_ICONS.best;
    }

    function makeWarningIconSVG() {
      return SVG_ICONS.warning;
    }

    function makeRulletIconSVG() {
      return SVG_ICONS.rullet;
    }


    function makeLabelIcon(type) {
      if (type === 'new') {
        return `<span class="label-icon" aria-label="NEW">${makeNewIconSVG()}</span>`;
      }

      if (type === 'best') {
        return `<span class="label-icon" aria-label="BEST">${makeBestIconSVG()}</span>`;
      }

      if (type === 'rullet') {
        return `<span class="label-icon" aria-label="RULLET">${makeRulletIconSVG()}</span>`;
      }

      if (type === 'warning') {
        return `<span class="label-icon" aria-label="WARNING">${makeWarningIconSVG()}</span>`;
      }

      return '';
    }


    /* 테이블 */
    function makeTable(rows, numberVariant = 'purple', pageClass = '') {
      const bodyHTML = rows.map(([num, label, iconType = '', footnote = '', effect = '']) => {
        const safeNum = String(num ?? '').trim();
        const safeLabel = String(label ?? '').trim();
        const safeFootnote = String(footnote ?? '').trim();

        const mainRow = `
          <tr>
            <td class="num">
              ${safeNum ? `<div class="num-wrap">${makeNumberIcon(pageClass)}${makeNumberSVG(safeNum, numberVariant)}</div>` : ''}
            </td>
            <td class="label">
              <div class="label-wrap">
                <div class="label-text">${safeLabel ? makeLabelSVG(safeLabel, effect) : ''}</div>
                <div class="label-icon">${makeLabelIcon(iconType)}</div>
              </div>
          </tr>`;

        const footnoteRow = safeFootnote
          ? `
          <tr class="footnote-row">
            <td class="footnote" colspan="3">${makeFootnoteSVG(safeFootnote)}</td>
          </tr>`
          : '';

        return mainRow + footnoteRow;
      }).join('');

      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
            <col class="icon-col" />
          </colgroup>
          <tbody>
            ${bodyHTML}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}" data-page="${pageClass}">
          <div class="page-title ${titleClass}">${title}</div>
          ${makeTable(rows, variant, pageClass)}
        </div>`;
    }

    function makeSequenceHTML() {

      return Object.entries(PAGE_DATA)
        .map(([pageKey, pageObj]) => {

          const color = pageObj.color || 'blue';

          return `
            ${makePage(
              pageObj.title,
              `title-${color}`,
              pageObj.rows,
              color,
              pageKey
            )}
            <div class="page-gap" aria-hidden="true"></div>
          `;
        })
        .join('');
    }

    function extractFixedPage() {
      if (!FIXED_PAGE_KEY) return; // ← 추가
      const fixedContainer = document.getElementById('fixedPage');

      // sequenceA 기준으로 찾기
      const target = sequenceA.querySelector(`[data-page="${FIXED_PAGE_KEY}"]`);

      if (!target) return;

      // 복제해서 고정 영역으로 이동
      fixedContainer.innerHTML = target.outerHTML;

      // 스크롤에서 제거 (A/B 둘 다 제거)
      [sequenceA, sequenceB].forEach(seq => {
        const el = seq.querySelector(`[data-page="${FIXED_PAGE_KEY}"]`);
        if (!el) return;

        const next = el.nextElementSibling;

        el.remove();

        // 바로 다음이 gap이면 그것만 제거
        if (next && next.classList.contains('page-gap')) {
          next.remove();
        }
      });
    }

    function applyWaveToFixedTitle() {
      if (!FIXED_PAGE_KEY) return;

      const fixedContainer = document.getElementById('fixedPage');
      const titleEl = fixedContainer.querySelector('.page-title');

      if (!titleEl) return;

      const text = titleEl.textContent.trim();

      // 글자 단위로 쪼개서 span 적용
      titleEl.innerHTML = [...text].map((c, i) =>
        `<span class="waveChar" style="animation-delay:${i * 0.08}s">${c}</span>`
      ).join('');
    }

    function adjustViewportHeight() {
      const vh = document.querySelector('.viewport');

      if (!FIXED_PAGE_KEY) {
        document.documentElement.style.setProperty('--fixed-page-h', `0px`);
        return;
      }

      const fixed = document.getElementById('fixedPage');
      const h = fixed.offsetHeight || 0;

      document.documentElement.style.setProperty('--fixed-page-h', `${h}px`);
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    
    async function init() {

      await loadSheetData();

      sequenceA.innerHTML = makeSequenceHTML();
      sequenceB.innerHTML = makeSequenceHTML();

      extractFixedPage();

      applyWaveToFixedTitle();

      adjustViewportHeight();

      if (!FIXED_PAGE_KEY) {
        document.getElementById('fixedPage').style.display = 'none';
      }

      updateLoopHeight();
    }

    init();

    if (!FIXED_PAGE_KEY) {
      document.getElementById('fixedPage').style.display = 'none';
    }

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
