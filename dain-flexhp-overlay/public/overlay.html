<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>플렉스TV 다인 오버레이</title>

  <style>
    @font-face {
      font-family: 'NexonMaplestory';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/NEXON%20Lv1%20Gothic%20OTF.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      font-family: 'NexonMaplestory', sans-serif !important;
    }

    html,
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .overlay {
      width: 760px;
      margin-top: 40px;
      padding: 24px;
      color: #fff;
      background: rgba(0, 0, 0, 0.28);
      border: 4px solid #fff;
      border-radius: 28px;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0 0 8px rgba(0,0,0,0.8);
    }

    .title {
      height: 78px;
      line-height: 70px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 44px;
      font-weight: 900;
      color: #fff;
      border: 4px solid #fff;
      border-radius: 22px;
      background: linear-gradient(90deg, #59d6ff, #a884ff, #ff9bd8);
      box-shadow: 0 6px 0 rgba(0,0,0,0.35);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 74px 1fr;
      align-items: center;
      min-height: 60px;
      padding: 8px 18px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.15);
      font-size: 30px;
      font-weight: 900;
    }

    .num {
      text-align: right;
      padding-right: 16px;
      color: #ffe66d;
    }

    .text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading,
    .error,
    .empty {
      padding: 40px 16px;
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.45;
    }

    .error {
      color: #ff9b9b;
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="title">다인</div>
    <div id="list" class="list">
      <div class="loading">데이터 불러오는 중...</div>
    </div>
  </div>

  <script>
    const API_URL = '/api/proxy';
    const REFRESH_MS = 30000;

    const listEl = document.getElementById('list');

    async function loadData() {
      try {
        const res = await fetch(API_URL, {
          method: 'GET',
          cache: 'no-store'
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || 'proxy error');
        }

        const parser = new DOMParser();
        const doc = parser.parseFromString(data.html, 'text/html');

        const items = extractItems(doc);

        render(items);
      } catch (err) {
        console.error(err);

        listEl.innerHTML = `
          <div class="error">
            데이터 로드 실패<br>
            ${escapeHtml(err.message || err)}
          </div>
        `;
      }
    }

    function extractItems(doc) {
      /*
        1차 범용 추출 방식.
        flexhp 원본 DOM 구조가 바뀌거나,
        원하는 데이터 위치가 명확하면 이 부분만 수정하면 됨.
      */

      const candidates = [];

      const selectors = [
        '.info-box',
        '.list',
        '.item',
        '.row',
        '.text',
        'li',
        'td',
        'div',
        'span'
      ];

      selectors.forEach(selector => {
        doc.querySelectorAll(selector).forEach(el => {
          const text = normalizeText(el.textContent);

          if (!text) return;
          if (text.length < 2) return;
          if (text.length > 50) return;

          candidates.push(text);
        });
      });

      const blockedWords = [
        'FlexTV 방송도우미',
        'dom-select',
        'script',
        'style',
        'undefined',
        'null'
      ];

      const unique = [...new Set(candidates)]
        .filter(text => !blockedWords.some(word => text.includes(word)))
        .filter(text => !/^\d+$/.test(text))
        .slice(0, 20);

      return unique.map((text, index) => ({
        rank: index + 1,
        text
      }));
    }

    function render(items) {
      if (!items.length) {
        listEl.innerHTML = `<div class="empty">표시할 데이터가 없습니다.</div>`;
        return;
      }

      listEl.innerHTML = items.map(item => `
        <div class="row">
          <div class="num">${item.rank}</div>
          <div class="text">${escapeHtml(item.text)}</div>
        </div>
      `).join('');
    }

    function normalizeText(value) {
      return String(value || '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadData();
    setInterval(loadData, REFRESH_MS);
  </script>
</body>
</html>
