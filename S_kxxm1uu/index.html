<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=350, height=1080, initial-scale=1.0" />
  <title>숲 단하나_♥ 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'OneStoreMobilePop';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/ONE-Mobile-POP.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    :root {
      --w: 350px;
      --h: 1080px;
      --row-gap: 4px;
      --num-col: 94px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 70s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'OneStoreMobilePop', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }
    col.icon-col { width: 34px; }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: left;
    }

    td.label {
      padding-left: 4px;
    }

    td.icon-cell {
      width: 34px;
      text-align: left;
      vertical-align: middle;
    }

    td.footnote {
      padding: 0 0 0 6px;
      white-space: nowrap;
      line-height: 1;
    }

    .page-title {
      width: 240px;
      height: 36px;
      line-height: 36px;
      margin: 0 0 6px 0;
      text-align: center;
      font-family: 'OneStoreMobilePop', Arial, sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: #ffffff;
      border: 2px solid currentColor;
      border-radius: 10px;
      box-sizing: border-box;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .title-gray {
      background: #bfbfbf;
      border-color: #262525;
    }

    .title-pink {
      background: #FAB0C1;
      border-color: #D36C86;
    }

    .title-orange {
      background: #EF9573;
      border-color: #C96541;
    }

    .title-yellow {
      background: #FEFA94;
      border-color: #D4BE36;
    }

    .title-purple {
      background: #DCAEF8;
      border-color: #9F67C3;
    }

    .title-blue {
      background: #4A90E2;
      border-color: #1F5EA6;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: auto;
    }
    
    .num-svg,
    .label-svg,
    .footnote-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      object-fit: contain;
      display: block;
      margin-left: -6px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }


    .fixed-bottom-label {
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: 4px;
      width: 240px;
      height: 20px;

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'OneStoreMobilePop', Arial, sans-serif;
      font-size: 10px;
      font-weight: 300;
      color: #ffffff;

      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #ffffff;
      border-radius: 10px;

      box-sizing: border-box;
      z-index: 50;

      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000;
    }


    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>

    const FONT = 'OneStoreMobilePop, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
    const ICON_NEW = 'https://i.imgur.com/a5s2iUL.png';
    const ICON_BEST = 'https://i.imgur.com/1Z3VEON.png';
    const ICON_Rullet = 'https://i.imgur.com/hVpuiwV.png';

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="0.0" flood-color="#ffffff" flood-opacity="0"/>
          </filter>
        </defs>`;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'pink') {
      const width = numWidth(num.length);
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      const fillColor =
        variant === 'gray' ? '#787878' :
        variant === 'pink' ? '#FAB0C1' :
        variant === 'orange' ? '#EF9573' :
        variant === 'yellow' ? '#FEFA94' :
        variant === 'purple' ? '#DCAEF8' :
        '#4A90E2';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
          <text x="14" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="28"
            font-weight="400"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 500) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      return Math.ceil(ctx.measureText(text).width);
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 500);
      const w = Math.max(40, measured + 10); // 여백 10 정도
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="label-svg" viewBox="0 0 ${w} 34"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
            <text x="14" y="25"
              text-anchor="start"
              font-family="${FONT}"
              font-size="28"
              font-weight="400"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    /* 각주 */
    function makeFootnoteSVG(footnote) {
      const t = esc(footnote);
      const measured = measureTextWidth(footnote, 20, FONT, 500);
      const w = Math.max(40, measured + 10);
      const filterId = `footnoteShadow-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="footnote-svg" viewBox="0 0 ${w} 30"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
            <text x="114" y="10"
              text-anchor="start"
              font-family="${FONT}"
              font-size="20"
              font-weight="500"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    /* 아이콘 */
    function makeLabelIcon(type) {
      let src = '';
      let alt = '';

      if (type === 'new') {
        src = ICON_NEW;
        alt = 'NEW';
      } else if (type === 'best') {
        src = ICON_BEST;
        alt = 'BEST';
      } else if (type === 'rullet') {
        src = ICON_Rullet;
        alt = 'RULLET';
      } else {
        return '';
      }

      return `<img class="label-icon" src="${src}" alt="${alt}">`;
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      const bodyHTML = rows.map(([num, label, iconType = '', footnote = '']) => {
        const safeNum = String(num ?? '').trim();
        const safeLabel = String(label ?? '').trim();
        const safeFootnote = String(footnote ?? '').trim();

        const mainRow = `
          <tr>
            <td class="num">${safeNum ? makeNumberSVG(safeNum, numberVariant) : ''}</td>
            <td class="label">
              <div class="label-wrap">
                <div class="label-text">${safeLabel ? makeLabelSVG(safeLabel) : ''}</div>
              </div>
            </td>
            <td class="icon-cell">${makeLabelIcon(iconType)}</td>
          </tr>`;

        const footnoteRow = safeFootnote
          ? `
          <tr class="footnote-row">
            <td class="footnote" colspan="3">${makeFootnoteSVG(safeFootnote)}</td>
          </tr>`
          : '';

        return mainRow + footnoteRow;
      }).join('');

      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
            <col class="icon-col" />
          </colgroup>
          <tbody>
            ${bodyHTML}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}">
          <div class="page-title ${titleClass}">${title}</div>
          ${makeTable(rows, variant)}
        </div>`;
    }

    function makeSequenceHTML() { /*페이지 정리*/
      return `
        ${makePage('♥프로필♥', 'title-gray', PAGE_1, 'gray', 'page-1')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('♥미션판♥', 'title-orange', PAGE_2, 'orange', 'page-2')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('📸방셀📸', 'title-yellow', PAGE_3, 'yellow', 'page-3')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('♥역팬 10%♥', 'title-purple', PAGE_4, 'purple', 'page-4')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('♥시그/리액션♥', 'title-pink', PAGE_5, 'pink', 'page-5')}
        <div class="page-gap" aria-hidden="true"></div>
    <!-- 열혈시그 
        ${makePage('♥열혈시그♥', 'title-blue', PAGE_6, 'blue', 'page-6')}
        <div class="page-gap" aria-hidden="true"></div>
    -->
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
