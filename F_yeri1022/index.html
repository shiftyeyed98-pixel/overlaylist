<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=400, height=1080, initial-scale=1.0" />
  <title>플렉스TV 예리 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'SchoolSafetyRoundedSmile';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-5@1.0/HakgyoansimDunggeunmisoTTF-B.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
    }

    :root {
      --w: 400px;
      --h: 1080px;
      --row-gap: 4px;
      --num-col: 72px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 50s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;
      --title-top-gap: 6px;
      --title-left-gap: 6px;

      /* ===== 고정 타이틀 영역 ===== */
      --fixed-title-h: 42px;  /* 타이틀이 차지하는 세로 영역 */
      --fixed-title-mb: 6px;  /* 타이틀과 리스트 사이 여백 */
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'SchoolSafetyRoundedSmile', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .fixed-title-wrap {
      position: absolute;
      left: 0;
      top: var(--title-top-gap);
      left: var(--title--gap);
      width: 100%;
      height: var(--fixed-title-h);
      z-index: 10;
      pointer-events: none;
      background: transparent;
    }

    .viewport {
      position: absolute;
      left: 0;
      top: calc(var(--fixed-title-h) + var(--fixed-title-mb) + var(--title-top-gap));
      width: 100%;
      height: calc(100% - var(--fixed-title-h) - var(--fixed-title-mb));
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      display: grid;
      place-items: center;
    }

    td.label {
      padding-left: 4px;
    }

    .page-title {
      width: 200px;
      height: 36px;
      line-height: 36px;
      margin: 0;
      text-align: center;
      font-family: 'SchoolSafetyRoundedSmile', Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      border-radius: 40px;
      box-sizing: border-box;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .title-pink {
      background: #F4AAE4;
    }

    .title-blue {
      background: #8fd0ff;
    }

    .title-yellow {
      background: #F6E58D;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0px;
    }

    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      position: static;
      width: 38px;
      height: 38px;
      flex: 0 0 26px;
      object-fit: contain;
      display: block;
      margin-left: -4px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      display: flex;
      align-items: center;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <!-- 타이틀은 스크롤 트랙 밖에 배치해서 항상 상단에 고정 -->
    <div class="fixed-title-wrap">
      <div class="page-title title-pink">예리한 시그 </div>
    </div>

    <!-- 숫자 / 텍스트 / 아이콘만 이 영역 안에서 무한 순환 -->
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_1 = [
      ['9','태권도','new'],
      ['10','와라왕'],
      ['11','와라왕 2배'],
      ['33','숫자송','new'],
      ['34','모찌송','new'],
      ['35','키세스'],
      ['45','너뿐이야'],
      ['50','캐치캐치','new'],
      ['55','캥거루','new'],
      ['83','모시모시'],
      ['88','삐끼삐끼'],
      ['101','스마트'],
      ['104','귀여워서미안해'],
      ['105','나니가스키'],
      ['108','솜사탕'],
      ['110','이머전시'],
      ['111','엔젤','new'],
      ['119','마녀배달부키키'],
      ['120','바람피면디지는거야'],
      ['121','자기야 화풀어'],
      ['122','나랑사귈래'],
      ['123','사쿠란보'],
      ['132','업'],
      ['134','오빠바이러스'],
      ['135','슈퍼그럼요'],
      ['136','내얘기를들어봐'],
      ['138','토끼춤'],
      ['146','포켓몬'],
      ['157','홀드업'],
      ['174','이꾸욧'],
      ['175','붕가'],
      ['176','미스터츄','new'],
      ['182','외모체크'],
      ['184','엘에스디'],
      ['185','반해'],
      ['200','고민중독'],
      ['201','이게사랑이지뭐야'],
      ['202','바빠','new'],
      ['211','너와의모든지금'],
      ['212','뽁뽁뽁'],
      ['213','마티니'],
      ['214','러브쉐이크'],
      ['215','핑크레이디'],
      ['216','포켓로켓'],
      ['217','스파게티','new'],
      ['220','바우치'],
      ['221','WTF'],
      ['222','빛을따라서'],
      ['223','테디베어'],
      ['224','이퓨럽미'],
      ['225','앙카'],
      ['230','바니바니챌린지'],
      ['231','We Go'],
      ['232','그래비티'],
      ['233','헨타이'],
      ['234','오빠 나 해도돼'],
      ['235','야메떼','new'],
      ['240','Waveway'],
      ['241','S.O.S'],
      ['242','버터플라이'],
      ['244','버터플라이'],
      ['245','제로투'],
      ['246','터미널'],
      ['247','뉴쿠란보'],
      ['258','라라리라라'],
      ['274','이루리'],
      ['275','무아'],
      ['281','야몽음인','new'],
      ['289','미야오'],
      ['300','모또모또'],
      ['312','겐또'],
      ['313','스텝']
    ];

    const FONT = 'SchoolSafetyRoundedSmile, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
    const ICON_NEW = 'https://i.imgur.com/etmR2k2.png';
    const ICON_BEST = 'https://i.imgur.com/1Z3VEON.png';
    const ICON_Rullet = 'https://i.imgur.com/BfBWx6n.png';

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="1" dy="1" stdDeviation="3.2" flood-color="#ffffff" flood-opacity="0.9"/>
          </filter>
        </defs>`;
    }

    const FIXED_NUM_WIDTH = parseInt(
      getComputedStyle(document.documentElement)
        .getPropertyValue('--num-col')
    );

    /* 단가 */
    function makeNumberSVG(num, variant = 'pink') {
      const width = FIXED_NUM_WIDTH;
      const cx = width / 2;
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      /* 글꼴색 */
      const fillColor =
        variant === 'blue' ? '#8fd0ff' :
        variant === 'yellow' ? '#F6E58D' :
        '#FDA6E8';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.8 1)">
          <text x="${cx}" y="25"
            text-anchor="middle"
            font-family="${FONT}"
            font-size="28"
            font-weight="500"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 500) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      return Math.ceil(ctx.measureText(text).width);
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 500);
      const w = Math.max(40, measured + 10); // 여백 10 정도
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="label-svg" viewBox="0 0 ${w} 34"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.8 1)">
            <text x="4" y="26"
              text-anchor="start"
              font-family="${FONT}"
              font-size="30"
              font-weight="500"
              stroke="#26080B"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    function makeLabelIcon(type) {
      let src = '';
      let alt = '';

      if (type === 'new') {
        src = ICON_NEW;
        alt = 'NEW';
      } else if (type === 'best') {
        src = ICON_BEST;
        alt = 'BEST';
      } else if (type === 'rullet') {
        src = ICON_Rullet;
        alt = 'RULLET';
      } else {
        return '';
      }

      return `<img class="label-icon" src="${src}" alt="${alt}">`;
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, label, iconType = '']) => `
              <tr>
                <td class="num">${makeNumberSVG(num, numberVariant)}</td>
                <td class="label">
                  <div class="label-wrap">
                    <div class="label-text">${makeLabelSVG(label)}</div>
                    ${makeLabelIcon(iconType)}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makePage(rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}">
          ${makeTable(rows, variant)}
        </div>`;
    }

    function makeSequenceHTML() { 
      return `
        ${makePage(PAGE_1, 'pink', 'page-1')}
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
</body>
</html>
