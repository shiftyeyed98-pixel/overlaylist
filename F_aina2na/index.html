<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=300, height=1080, initial-scale=1.0" />
  <title>이나 리액션 리스트</title>
  <style>

      @font-face {
          font-family: 'Paperozi';
          src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
          font-weight: 500;
          font-display: swap;
      }

    :root {
      --w: 300px;
      --h: 1080px;
      --row-gap: 4px;
      --icon-wrap-col: 34px;
      --num-col: 80px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 30s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'Paperozi', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.icon-wrap-col { width: var(--icon-wrap-col); }
    col.num-col       { width: var(--num-col); }
    col.text-col      { width: auto; }

    td.label-combined {
      padding-left: 0 !important;
    }

    .label-line {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      white-space: nowrap;
    }

    .label-main {
      display: block;
    }

    .label-note-inline {
      display: block;
      position: relative;
      top: 0;
      margin-left: -4px;
    }

    .note-svg {
      display: block;
      width: auto;
      height: 22px;
      overflow: visible;
    }

    td.icon-num-cell {
      padding: 0 !important;
      vertical-align: middle;
    }

    .icon-num-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      width: 100%;
    }

    .icon-wrap {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    .num-box {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      min-width: var(--num-col);
    }

    .num-box .num-svg {
      display: block;
      margin: 0;
    }
   
    .page-title {
      width: 200px;
      height: 44px;
      margin: 0 0 6px 0;
      position: relative;              /* 추가 */
      display: flex;
      align-items: center;
      justify-content: center;         /* 텍스트 중앙 */
      text-align: center;
      font-family: 'YeogiOttaeJalnan', Arial, sans-serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      color: #ffffff;
      border-radius: 40px;
      box-sizing: border-box;
      border: 6px solid transparent;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000;
    }

    .title-purple {
      background: #C97BD0;
      border-color: #973ed3;
    }

    .title-blue {
      background: #3e78eb;
      border-color: #0e30a0;
    }

    .title-yellow {
      background: #f8e584;
      border-color: #d8bc04;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      width: 26px;
      height: 26px;
      display: block;
      margin: 0;
    }
    
    .label-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .page-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .page-title-text {
      display: inline-block;
      line-height: 1;
      text-align: center;
    }

    .page-title-icon {
      position: absolute;
      left: 10px; 
      width: 30px;
      height: 30px;
      display: inline-block;
      object-fit: contain;
      flex: 0 0 30px;
    }

    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>

    const FONT = 'Paperozi, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      return 92;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="0.0" flood-color="#ffffff" flood-opacity="0"/>
          </filter>
        </defs>`;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'purple') {
      const width = numWidth(num.length);
      const cx = width / 2;
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      const fillColor =
        variant === 'blue' ? '#3e78eb' :
        variant === 'yellow' ? '#f8e584' :
        '#C97BD0';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
          <text x="${width - 1}" y="25"
            text-anchor="end"
            font-family="${FONT}"
            font-size="28"
            font-weight="600"
            stroke="#ffffff"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 500) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      return Math.ceil(ctx.measureText(text).width);
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 500);
      const w = Math.max(40, measured + 0); // 여백 10 정도
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="label-svg" viewBox="0 0 ${w} 34"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
            <text x="4" y="25"
              text-anchor="start"
              font-family="${FONT}"
              font-size="28"
              font-weight="600"
              stroke="#ffffff"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#000000">${t}</text>
          </g>
        </svg>`;
    }

    /* 각주 */
    function makeNoteSVG(note) {
      const t = esc(note);
      const measured = measureTextWidth(note, 20, FONT, 500);
      const w = Math.max(20, measured + 8);
      const filterId = `noteShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="note-svg" viewBox="0 0 ${w} 26"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
            <text x="0" y="20"
              text-anchor="start"
              font-family="${FONT}"
              font-size="22"
              font-weight="600"
              stroke="#ffffff"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#000000">${t}</text>
          </g>
        </svg>`;
    }

    function makeWarningIconSVG() {
      return `
        <svg id="Layer_1" data-name="Layer 1"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 122.88 111.54"

          preserveAspectRatio="xMidYMid meet">
          
          <defs>
            <style>
              .cls-1{fill:#cf1f25;}
              .cls-2{fill:#fec901;fill-rule:evenodd;}

    function makeLabelIcon(type) {
      if (type === 'new') {
        return `<div class="icon-wrap" aria-label="NEW">${makeNewIconSVG()}</div>`;
      }

      if (type === 'rullet') {
        return `<div class="icon-wrap" aria-label="RULLET">${makeRulletIconSVG()}</div>`;
      }

      if (type === 'best') {
        return `<div class="icon-wrap" aria-label="BEST">${makeBestIconSVG()}</div>`;
      }

      if (type === 'warning') {
        return `<div class="icon-wrap" aria-label="WARNING">${makeWarningIconSVG()}</div>`;
      }

      return '';
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="icon-wrap-col" />
            <col class="num-col" />
            <col class="text-col" />
          </colgroup>
          <tbody>
            ${rows.map(([num, label, note = '', iconType = '']) => `
              <tr>
                <td class="icon-num-cell">${makeLabelIcon(iconType)}</td>
                <td class="icon-num-cell">
                  <div class="num-box">${makeNumberSVG(num, numberVariant)}</div>
                </td>
                <td class="label-combined">
                  <div class="label-line">
                    <div class="label-main">${makeLabelSVG(label)}</div>
                    ${note ? `<div class="label-note-inline">${makeNoteSVG(note)}</div>` : ''}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}">
          <div class="page-title ${titleClass}">
         <!--   <img class="page-title-icon" src="https://i.imgur.com/dZTzjV9.png" alt="" crossorigin="anonymous" />
         -->   <span class="page-title-text">${title}</span>
          </div>
          ${makeTable(rows, variant)}
        </div>`;
    }

    function makeSequenceHTML() { /*페이지 정리*/
      return `
        ${makePage('시그니처', 'title-purple', PAGE_1, 'purple', 'page-1')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('룰렛', 'title-blue', PAGE_2, 'blue', 'page-2')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('운동/능욕', 'title-yellow', PAGE_3, 'yellow', 'page-3')}
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);

  </script>
