<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=300, height=1080, initial-scale=1.0" />
  <title>플렉스TV 로랜드 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'Presentation';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-6SemiBold.woff2') format('woff2');
        font-weight: 600;
        font-display: swap;
    }

    :root {
      --w: 300px;
      --h: 1080px;
      --row-gap: 16px;
      --num-col: 72px;
      --emoji-col: 34px;
      --svg-h: 30px;
      --page-gap: 28px;
      --emoji-color: #ff3d73;
      --outline: 5;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      min-height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'Presentation', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      min-height: var(--h);
      box-sizing: border-box;
      padding: 10px 8px;
      overflow: hidden;
      background: transparent !important;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 36px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }
    col.emoji-col { width: var(--emoji-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num,
    td.emoji {
      text-align: center;
    }

    td.label {
      padding-left: 4px;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: 100%;
      height: var(--svg-h);
      overflow: visible;
    }

    .emoji {
      font-size: 30px;
      color: var(--emoji-color);
      font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    .emoji-svg {
      display: block;
      width: 30px;
      height: 30px;
      margin: 0 auto;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>

  <script>
    const PAGE_1 = [
      ["1","💗","빗질"],
      ["2","💗","으악"],
      ["3","💗","으어"],
      ["4","💗","유후~"],
      ["5","💗","요롤레이요"],
      ["6","💗","숟딱"],
      ["10","💗","ㅈ싸"],
      ["","","<풀세트30개>"]
    ];
/*
    const PAGE_2 = [      
      ["110","💗","제로투"]
    ];
*/
    const FONT = 'Presentation, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeEmojiSVG() {
      return `
        <svg class="emoji-svg" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <filter id="emojiOutline" x="-50%" y="-50%" width="200%" height="200%">
              <feMorphology in="SourceAlpha" operator="dilate" radius="1.8" result="thicken"/>
              <feFlood flood-color="#000000" result="outlineColor"/>
              <feComposite in="outlineColor" in2="thicken" operator="in" result="outline"/>
              <feMerge>
                <feMergeNode in="outline"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <image
            href="https://www.flextv.co.kr/icon/ico_flex.svg"
            x="0"
            y="0"
            width="24"
            height="24"
            filter="url(#emojiOutline)"
            preserveAspectRatio="xMidYMid meet"
          />
        </svg>`;
    }

    function makeNumberSVG(num) {
      const width = numWidth(num.length);
      const cx = width / 2;
      const t = esc(num);
      const gid = `grad-${t}-${Math.random().toString(36).slice(2, 9)}`;
      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          <defs>
            <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#000000"/>
              <stop offset="30%" stop-color="#000000"/>
              <stop offset="65%" stop-color="#000000"/>
              <stop offset="100%" stop-color="#000000"/>
            </linearGradient>
          </defs>
          <text x="${cx}" y="25"
            text-anchor="middle"
            font-family="${FONT}"
            font-size="30"
            font-weight="700"
            stroke="#FFFFFF"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            fill="url(#${gid})">${t}</text>
        </svg>`;
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      return `
        <svg class="label-svg" viewBox="0 0 172 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img" preserveAspectRatio="xMinYMid meet">
          <text x="4" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="30"
            font-weight="700"
            stroke="#FFFFFF"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            fill="#000000">${t}</text>
        </svg>`;
    }

    function makeTable(rows) {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col class="emoji-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, emoji, label]) => `
              <tr>
                <td class="num">${makeNumberSVG(num)}</td>
                <td class="emoji">${makeEmojiSVG()}</td>
                <td class="label">${makeLabelSVG(label)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makeOverlayHTML() {
      return `
        <div class="page page-1">${makeTable(PAGE_1)}</div>
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    document.getElementById('overlay').innerHTML = makeOverlayHTML();
  </script>
</body>
</html>
