<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=380, height=1080, initial-scale=1.0" />
  <title>플렉스TV 유빈✨ 리액션 리스트</title>
  <style>

        @font-face {
          font-family: 'GmarketSansBold';
          src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
          font-weight: 700;
          font-style: normal;
          font-display: swap;
        }

    :root {
      --w: 380px;
      --h: 1080px;
      --row-gap: 4px;
      --num-col: 96px;
      --num-icon-size: 28px;
      --svg-h: 30px;
      --page-gap: 10px;
      --loop-seconds: 50s;
      --sequence-height: 1000px;
      --outline: 5;

      /* ===== 고정 타이틀 영역 ===== */
      --fixed-title-h: 36px;
      --fixed-title-mb: 2px;

      /* ===== 고정 페이지 영역 ===== */
      --fixed-page-h: 0px; /* 기본값 */

      /* ===== 하단 고정바 영역 ===== */
      --fixed-bottom-h: 20px;
      --fixed-bottom-bottom: 0px;
      --fixed-bottom-mt: 0px;
    }


    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'GmarketSansBold', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
    }

    .fixed-title-wrap {
      position: absolute;
      left: 4px;
      top: 4px;
      width: calc(100% - 8px);
      height: var(--fixed-title-h);
      z-index: 10;
      pointer-events: none;
      background: transparent;
    }
    
    .viewport {
      position: absolute;
      left: 4px;
        top: calc(
        var(--fixed-title-h)
        + var(--fixed-title-mb)
        + var(--fixed-page-h) + 20px
      );
      width: 100%;
      height: calc(
        100%
        - var(--fixed-title-h)
        - var(--fixed-title-mb)
        - var(--fixed-bottom-h)
        - var(--fixed-bottom-bottom)
        - var(--fixed-bottom-mt)
      );
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }
    col.icon-col { width: 34px; }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: left;
    }

    .num-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      width: max-content;
      height: var(--svg-h);
    }

    .num-left-icon {
      width: var(--num-icon-size);
      height: var(--num-icon-size);
      flex: 0 0 var(--num-icon-size);
      object-fit: contain;
      display: block;
      margin: 0;
    }

    td.label {
      padding-left: 4px;
    }

    td.icon-cell {
      width: 34px;
      text-align: left;
      vertical-align: middle;
    }

    td.footnote {
      padding: 0 0 0 6px;
      white-space: nowrap;
      line-height: 1;
    }

    .page-title {
      width: 240px;
      height: 36px;
      line-height: 36px;
      margin: 0 0 6px 0;
      text-align: center;
      font-family: 'GmarketSansBold', Arial, sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: #ffffff;
      border: 2px solid currentColor;
      border-radius: 10px;
      box-sizing: border-box;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .title-gray {
      background: #bfbfbf;
      border-color: #262525;
    }

    .title-black {
      background: #111111;
      border-color: #484848;
    }

    .title-pink {
      background: #FAB0C1;
      border-color: #D36C86;
    }

    .title-orange {
      background: #EF9573;
      border-color: #C96541;
    }

    .title-yellow {
      background: #FEFA94;
      border-color: #D4BE36;
    }

    .title-purple {
      background: #9656bd;
      border-color: #7727a8;
    }

    .title-blue {
      background: #4A90E2;
      border-color: #1F5EA6;
    }

    .title-green {
      background: #6BCB77;
      border-color: #3E8E41;
    }

    .title-red {
      background: #FF6B6B;
      border-color: #C44545;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px; /* 텍스트와 아이콘 간격 */
    }
    
    .num-svg,
    .label-svg,
    .footnote-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      width: 28px;
      height: 40px;
      flex: 0 0 40px;
      object-fit: contain;
      display: block;
      margin-left: 10px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }

    .fixed-page-wrap {
      position: absolute;
      left: 4px;
      top: calc(var(--fixed-title-h) + var(--fixed-title-mb));
      width: calc(100% - 8px);
      z-index: 8;
      pointer-events: none;
    }

    .fixed-page-wrap.has-fixed::before {
      width:310px;
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(180, 180, 180, 0.06);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow:
        0 6px 16px rgba(0,0,0,0.4),
        inset 0 1px 2px rgba(255,255,255,0.15);
      z-index: -1;
    }

    .fixed-bottom-label {
      position: absolute;
      left: 4px;
      bottom: var(--fixed-bottom-bottom);
      width: 240px;
      height: var(--fixed-bottom-h);

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'GmarketSansBold', Arial, sans-serif;
      font-size: 10px;
      font-weight: 100;
      color: #ffffff;

      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #ffffff;
      border-radius: 10px;

      box-sizing: border-box;
      z-index: 50;

      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000;
    }

    @keyframes riseLoop {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(0, calc(-1 * var(--sequence-height)), 0);
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <!-- 타이틀은 스크롤 트랙 밖에 배치해서 항상 상단에 고정 -->
    <div class="fixed-title-wrap">
      <div class="page-title title-black"> 유빈✨</div>
    </div>
     <!-- 타이틀 하단 스크롤 상단 배치하는 고정 페이지 영역 -->
    <div class="fixed-page-wrap" id="fixedPage"></div>
    <!-- 숫자 / 텍스트 / 아이콘만 이 영역 안에서 무한 순환 -->
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
    <div class="fixed-bottom-label">designed by 시프티♻️</div>
  </div>

  <script>

      /* =========================
        우클릭 / 개발자도구 차단
      ========================= */

      // 우클릭 차단
      document.addEventListener('contextmenu', e => {
        e.preventDefault();
      });

      // 드래그 선택 차단
      document.addEventListener('selectstart', e => {
        e.preventDefault();
      });

      // 드래그 차단
      document.addEventListener('dragstart', e => {
        e.preventDefault();
      });

      // 개발자도구 단축키 차단
      document.addEventListener('keydown', e => {

        // F12
        if (e.key === 'F12') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
          e.preventDefault();
          return false;
        }

        // Ctrl+U
        if (e.ctrlKey && e.key.toLowerCase() === 'u') {
          e.preventDefault();
          return false;
        }

        // Ctrl+S
        if (e.ctrlKey && e.key.toLowerCase() === 's') {
          e.preventDefault();
          return false;
        }

      });

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzTn-fgfGzHaSeeNTz-3SQOlRbxi__BUeBsZJnIouO69GxIbse4jpzS3pXJtxHjdQn6FA/exec';

const FONT = 'GmarketSansBold, Arial, sans-serif';

const STROKE = getComputedStyle(document.documentElement)
  .getPropertyValue('--outline')
  .trim() || 5;

const ICON_PUNG_P3 = 'https://i.imgur.com/eLHuINn.png';
const ICON_PUNG_P4 = 'https://i.imgur.com/hrOSI76.png';
const ICON_PUNG_P5 = 'https://i.imgur.com/QGhbbgx.png';

const PAGE_ICON_MAP = {
  gray: ICON_PUNG_P4,
  black: ICON_PUNG_P5,
  yellow: ICON_PUNG_P3,
  pink: ICON_PUNG_P4,
  blue: ICON_PUNG_P4,
  purple: ICON_PUNG_P4
};

const ICON_NEW = 'https://i.imgur.com/eHdlAJD.png';
const ICON_BEST = 'https://i.imgur.com/Gq4twBP.png';
const ICON_Rullet = 'https://i.imgur.com/hVpuiwV.png';

function esc(s) {
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function numWidth(len) {
  if (len >= 4) return 92;
  if (len === 3) return 76;
  return 58;
}

function makeShadowFilter(id) {
  return `
    <defs>
      <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="0" stdDeviation="0.0"
          flood-color="#ffffff"
          flood-opacity="0"/>
      </filter>
    </defs>`;
}

function makeNumberSVG(num, variant = 'black') {

  const width = numWidth(num.length);

  const t = esc(num);

  const filterId =
    `numShadow-${variant}-${Math.random().toString(36).slice(2, 9)}`;

  const fillColor =
    variant === 'gray' ? '#bfbfbf' :
    variant === 'pink' ? '#FAB0C1' :
    variant === 'orange' ? '#EF9573' :
    variant === 'yellow' ? '#FEFA94' :
    variant === 'blue' ? '#4A90E2' :
    variant === 'purple' ? '#DCAEF8' :
    '#000000';

  return `
    <svg class="num-svg"
      viewBox="0 0 ${width} 34"
      xmlns="http://www.w3.org/2000/svg">

      ${makeShadowFilter(filterId)}

      <text x="5"
        y="25"
        text-anchor="start"
        font-family="${FONT}"
        font-size="28"
        font-weight="400"
        stroke="#FFFFFF"
        stroke-width="${STROKE}"
        stroke-linejoin="round"
        paint-order="stroke fill"
        filter="url(#${filterId})"
        fill="${fillColor}">${t}</text>

    </svg>`;
}

function measureTextWidth(text, fontSize = 28) {

  const canvas =
    measureTextWidth.canvas ||
    (measureTextWidth.canvas = document.createElement('canvas'));

  const ctx = canvas.getContext('2d');

  ctx.font = `500 ${fontSize}px ${FONT}`;

  return Math.ceil(ctx.measureText(text).width);
}

function makeLabelSVG(label) {

  const t = esc(label);

  const measured = measureTextWidth(label);

  const w = Math.max(40, measured + 10);

  const filterId =
    `labelShadow-${Math.random().toString(36).slice(2, 9)}`;

  return `
    <svg class="label-svg"
      viewBox="0 0 ${w} 34"
      xmlns="http://www.w3.org/2000/svg">

      ${makeShadowFilter(filterId)}

      <text x="24"
        y="25"
        text-anchor="start"
        font-family="${FONT}"
        font-size="28"
        font-weight="400"
        stroke="#FFFFFF"
        stroke-width="${STROKE}"
        stroke-linejoin="round"
        paint-order="stroke fill"
        filter="url(#${filterId})"
        fill="#000000">${t}</text>

    </svg>`;
}

function makeFootnoteSVG(footnote) {

  const t = esc(footnote);

  const measured = measureTextWidth(footnote, 20);

  const w = Math.max(40, measured + 10);

  const filterId =
    `footnoteShadow-${Math.random().toString(36).slice(2, 9)}`;

  return `
    <svg class="footnote-svg"
      viewBox="0 0 ${w} 30"
      xmlns="http://www.w3.org/2000/svg">

      ${makeShadowFilter(filterId)}

      <text x="125"
        y="10"
        text-anchor="start"
        font-family="${FONT}"
        font-size="20"
        font-weight="500"
        stroke="#FFFFFF"
        stroke-width="${STROKE}"
        stroke-linejoin="round"
        paint-order="stroke fill"
        filter="url(#${filterId})"
        fill="#000000">${t}</text>

    </svg>`;
}

function makeNumberIcon(color) {

  const src = PAGE_ICON_MAP[color] || ICON_PUNG_P4;

  return `<img class="num-left-icon" src="${src}">`;
}

function makeLabelIcon(type) {

  let src = '';

  if (type === 'new') {
    src = ICON_NEW;
  }
  else if (type === 'best') {
    src = ICON_BEST;
  }
  else if (type === 'rullet') {
    src = ICON_Rullet;
  }

  if (!src) return '';

  return `<img class="label-icon" src="${src}">`;
}

function makeTable(rows, color = 'black') {

  const bodyHTML = rows.map(row => {

    const [
      num,
      label,
      iconType,
      footnote
    ] = row;

    return `
      <tr>

        <td class="num">

          ${
            num
            ? `
            <div class="num-wrap">
              ${makeNumberIcon(color)}
              ${makeNumberSVG(num, color)}
            </div>
            `
            : ''
          }

        </td>

        <td class="label">

          <div class="label-wrap">

            <div class="label-text">
              ${label ? makeLabelSVG(label) : ''}
            </div>

            ${makeLabelIcon(iconType)}

          </div>

        </td>

      </tr>

      ${
        footnote
        ? `
        <tr class="footnote-row">
          <td class="footnote" colspan="3">
            ${makeFootnoteSVG(footnote)}
          </td>
        </tr>
        `
        : ''
      }
    `;
  }).join('');

  return `
    <table>
      <colgroup>
        <col class="num-col" />
        <col />
      </colgroup>
      <tbody>
        ${bodyHTML}
      </tbody>
    </table>
  `;
}

function makePage(pageKey, pageData) {

  return `
    <div class="page ${pageKey}">

      <div class="page-title title-${pageData.color}">
        ${esc(pageData.title)}
      </div>

      ${makeTable(pageData.rows, pageData.color)}

    </div>
  `;
}

async function loadData() {

  const res = await fetch(GAS_URL);

  const data = await res.json();

  applyConfig(data);

  renderPages(data);
}

function applyConfig(data) {

  const titleEl = document.querySelector('.page-title');

  titleEl.textContent = data.mainTitle || '';

  titleEl.className =
    `page-title title-${data.mainTitleColor || 'green'}`;

  document.documentElement.style.setProperty(
    '--loop-seconds',
    `${data.scrollSeconds || 60}s`
  );
}

function renderPages(data) {

  const sequenceA = document.getElementById('sequenceA');
  const sequenceB = document.getElementById('sequenceB');

  const fixedWrap = document.getElementById('fixedPage');

  const fixedPages = data.fixedPages || [];

  const pages = data.pages || {};

  let fixedHTML = '';

  let scrollHTML = '';

  Object.entries(pages).forEach(([pageKey, pageData]) => {

    if (!pageData.enabled) return;

    const html = `
      ${makePage(pageKey, pageData)}
      <div class="page-gap"></div>
    `;

    if (fixedPages.includes(pageKey)) {
      fixedHTML += html;
    } else {
      scrollHTML += html;
    }

  });

  fixedWrap.innerHTML = fixedHTML;

  if (fixedHTML) {
    fixedWrap.classList.add('has-fixed');
  }

  sequenceA.innerHTML = scrollHTML;
  sequenceB.innerHTML = scrollHTML;

  requestAnimationFrame(() => {

    const h = fixedWrap.offsetHeight;

    document.documentElement.style.setProperty(
      '--fixed-page-h',
      `${h}px`
    );

    const seqH = sequenceA.offsetHeight;

    document.documentElement.style.setProperty(
      '--sequence-height',
      `${seqH}px`
    );

  });

}

loadData();

window.addEventListener('resize', () => {

  const seqH =
    document.getElementById('sequenceA').offsetHeight;

  document.documentElement.style.setProperty(
    '--sequence-height',
    `${seqH}px`
  );

});

  </script>
</body>
</html>
