<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=300, height=600, initial-scale=1.0" />
  <title>플렉스TV 소영 오버레이 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'KccSign';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/KCC-Ganpan.woff2') format('woff2');
        font-weight: normal;
        font-display: swap;
    }

    :root {
      --w: 300px;
      --h: 600px;
      --row-gap: 4px;
      --num-col: 72px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 50s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'KccSign', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: center;
    }

    td.label {
      padding-left: 4px;
    }

    .page-title {
      width: 200px;
      height: 40px;
      line-height: 36px;
      margin: 0 0 6px 0;
      text-align: center;
      font-family: 'KccSign', Arial, sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: #ffffff;
      border-radius: 8px;
      box-sizing: border-box;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .title-pink {
      background: #F8DDD5;
    }

    .title-blue {
      background: #8fd0ff;
    }

    .title-yellow {
      background: #F6E58D;
    }

    .label-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .label-icon {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      object-fit: contain;
      display: block;
      margin-left: -6px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_1 = [
      ["65","골반이 안멈춰"],
      ["79","포켓몬"],
      ["87","캐치캐치","new"],
      ["89","삐끼삐끼"],
      ["97","구찌보이"],
      ["112","마티니"],
      ["119","앙카"],
      ["126","꿈빛파티시엘"],
      ["127","핑크레이디"],
      ["136","러브쉐이크"],
      ["140","섹시푸드"],
      ["142","스키스키"],
      ["150","노래완곡"],
      ["151","고민중독"],
      ["152","테디베어"],
      ["153","어마어마해"],
      ["154","버터플라이"],
      ["158","오빠바이러스"],
      ["169","붕가댄스"],
      ["182","간바레센빠이"],
      ["184","팬서비스"],
      ["188","푱푱"],
      ["202","제로투"],
      ["238","홀드업"],
      ["252","햄토리"],
      ["282","이쁜여자가좋더라","new"],
      ["337","치얼업","new"],
      ["1004","미션곡"],
      ["2850","술먹방"],
      ["5750","카톡"],
    ];
   const PAGE_2 = [
      ["25","니코니코니"],
      ["60","슈퍼맨"],
      ["62","스키부대","best"],
      ["75","니코니2배속"],
      ["76","사마귀","best"],
      ["79","캥거루"],
      ["95","달리기"],
      ["99","닭비트"],
      ["101","역도"],
      ["111","콩나물"],
      ["160","뿌에뿌에"],
      ["200","괴짜가족1분"]

    ];
    const PAGE_3 = [
      ["77","연장"],
      ["78","단축"],
      ["130","벌칙"],
      ["145","먹먹마"],
      ["170","애교송"],
      ["770","슈퍼연장"],
      ["780","슈퍼단축"]
    ];

    const FONT = 'KccSign, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
    const ICON_NEW = 'https://i.imgur.com/a5s2iUL.png';
    const ICON_BEST = 'https://i.imgur.com/1Z3VEON.png';
    const ICON_Rullet = 'https://i.imgur.com/BfBWx6n.png';

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#ffffff" flood-opacity="1"/>
          </filter>
        </defs>`;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'pink') {
      const width = numWidth(num.length);
      const cx = width / 2;
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      const fillColor =
        variant === 'blue' ? '#8fd0ff' :
        variant === 'yellow' ? '#F6E58D' :
        '#F8DDD5';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
          <text x="${cx}" y="25"
            text-anchor="middle"
            font-family="${FONT}"
            font-size="28"
            font-weight="500"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function labelWidth(label) {
      return Math.max(40, label.length * 26);
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      const w = labelWidth(label);
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;
      return `
        <svg class="label-svg" viewBox="0 0 ${w} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img" preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
          <text x="4" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="28"
            font-weight="500"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    function makeLabelIcon(type) {
      let src = '';
      let alt = '';

      if (type === 'new') {
        src = ICON_NEW;
        alt = 'NEW';
      } else if (type === 'best') {
        src = ICON_BEST;
        alt = 'BEST';
      } else if (type === 'rullet') {
        src = ICON_Rullet;
        alt = 'RULLET';
      } else {
        return '';
      }

      return `<img class="label-icon" src="${src}" alt="${alt}">`;
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, label, iconType = '']) => `
              <tr>
                <td class="num">${makeNumberSVG(num, numberVariant)}</td>
                <td class="label">
                  <div class="label-wrap">
                    <div class="label-text">${makeLabelSVG(label)}</div>
                    ${makeLabelIcon(iconType)}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}">
          <div class="page-title ${titleClass}">${title}</div>
          ${makeTable(rows, variant)}
        </div>`;
    }

    function makeSequenceHTML() { /*페이지 정리*/
      return `
        ${makePage('시그니처', 'title-pink', PAGE_1, 'pink', 'page-1')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('운동/벌칙', 'title-blue', PAGE_2, 'blue', 'page-2')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('룰렛', 'title-yellow', PAGE_3, 'yellow', 'page-3')}
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
</body>
</html>
