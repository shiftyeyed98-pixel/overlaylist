<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=300, height=1080, initial-scale=1.0" />
  <title>OBS 오버레이 - 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'NostalgicMongtori';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-1@1.0/Griun_Mongtori-Rg.woff2') format('woff2');
        font-weight: normal;
        font-display: swap;
    }

    :root {
      --w: 300px;
      --h: 1080px;
      --row-gap: 4px;
      --num-col: 72px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 50s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'NostalgicMongtori', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 10px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: center;
    }

    td.label {
      padding-left: 0px;
      text-align: left;
    }

    .page-title {
      width: 200px;
      height: 38px;
      line-height: 36px;
      padding: 0;
      margin: 0 0 8px 0;
      text-align: center;
      font-family: 'NostalgicMongtori', Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      border-radius: 40px;
      box-sizing: border-box;
      border: 3px solid transparent;

      /* 글자 외곽선 */
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000,
        0px  3px 0 rgba(0,0,0,0.35);

      /* 타이틀 자체 입체감 */
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.55),  /* 윗면 하이라이트 */
        inset 0 -3px 0 rgba(0,0,0,0.18),       /* 아랫면 눌림 */
        0 4px 0 rgba(0,0,0,0.28),              /* 바깥 아래 그림자 */
        0 7px 14px rgba(0,0,0,0.18);           /* 퍼지는 그림자 */

      transform: translateZ(0);
    }

    /* 핑크 타이틀 */
    .title-pink {
      background:
        linear-gradient(to bottom, #ffe9e3 0%, #f8ddd5 55%, #efc7bc 100%);
      border-color: #d89f92;
    }

    /* 블루 타이틀 */
    .title-blue {
      background:
        linear-gradient(to bottom, #c9ebff 0%, #8fd0ff 55%, #63b8f2 100%);
      border-color: #4f96c9;
    }

    /* 옐로우 타이틀 */
    .title-yellow {
      background:
        linear-gradient(to bottom, #fff3b8 0%, #f6e58d 55%, #e4cd5a 100%);
      border-color: #bea63b;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: auto;
    }

    .label-icon {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      object-fit: contain;
      display: block;
      margin-left: -10px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_1 = [
      ["10","팬갑"],
      ["15","와라와라왕"],
      ["20","OVERDRIVE","best"],
      ["33","카와이"],
      ["44","패스트카"],
      ["49","와라와라⏩2배속"],
      ["55","삐끼삐끼"],
      ["66","치킨바나나"],
      ["77","외모체크"],
      ["88","키세스"],
      ["99","이멀전시"],
      ["100","Back it up"],
      ["111","Smart"],
      ["115","팬서비스"],
      ["116","UP"],
      ["117","헤비머신건"],
      ["119","바람피면디지는거야"],
      ["120","무아"],
      ["124","나랑사귈래"],
      ["125","슈퍼그럼요"],
      ["129","너와의모든지금"],
      ["130","핫해"],
      ["135","사탕도둑"],
      ["145","퍼킹뱅어"],
      ["149","WTF"],
      ["150","이게사랑이지뭐야"],
      ["155","벌룬인럽"],
      ["160","오빠바이러스"],
      ["165","러브쉐이크"],
      ["169","마티니"],
      ["170","우유"],
      ["175","마녀배달부키키"],
      ["180","바니바니"],
      ["185","핑크레이디"],
      ["190","제로투"],
      ["195","고민중독"],
      ["199","영차"],
      ["200","코카인"],
      ["225","L.S.D"],
      ["226","STAR"],
      ["228","파이팅해야지"],
      ["230","매니악"],
      ["235","빛을따라서"],
      ["240","뛰어"],
      ["245","여우"],
      ["250","진압해"],
      ["255","니코니코니"],
      ["260","간바레"],
      ["265","베이프"],
      ["270","도어"],
      ["275","이루리"],
      ["280","이꾸욧"],
      ["285","라라리라라"],
      ["290","터미널"],
      ["295","brrr"],
      ["299","오빠하앙"],
      ["310","NANANA"],
      ["333","바우치"],
      ["350","사랑받을 준비완료"],
      ["365","ASS UP"],
      ["390","E.D.M"],
      ["392","출항"],
      ["444","모또모또"],
      ["492","초월"],
      ["592","만개화"]
    ];
   const PAGE_2 = [
      ["30","뿅망치(몸)"],
      ["83","스키"],
      ["93","역도"],
      ["222","광어"],
      ["236","뿌에1분"],
      ["300","앙카1분"]
    ];
    const PAGE_3 = [
      ["74","연장","rullet"],
      ["75","단축","rullet"],
      ["500","노래완곡"],
      ["555","30분연장"],
      ["666","30분단축"],
      ["740","슈퍼연장","rullet"],
      ["750","슈퍼단축","rullet"],
      ["1414","밥먹어"],
      ["1415","먹지마"],
      ["1492","방셀"]
    ];

    const FONT = 'NostalgicMongtori, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
    const ICON_NEW = 'https://i.imgur.com/a5s2iUL.png';
    const ICON_BEST = 'https://i.imgur.com/1Z3VEON.png';
    const ICON_Rullet = 'https://i.imgur.com/BfBWx6n.png';

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="0.0" flood-color="#ffffff" flood-opacity="0"/>
          </filter>
        </defs>`;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'pink') {
      const width = numWidth(num.length);
      const cx = width / 2;
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      const fillColor =
        variant === 'blue' ? '#8fd0ff' :
        variant === 'yellow' ? '#F6E58D' :
        '#F8DDD5';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
          <text x="4" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="28"
            font-weight="500"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 500) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      return Math.ceil(ctx.measureText(text).width);
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 500);
      const w = Math.max(40, measured + 10); // 여백 10 정도
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="label-svg" viewBox="0 0 ${w} 34"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(0.9 1)">
            <text x="4" y="25"
              text-anchor="start"
              font-family="${FONT}"
              font-size="28"
              font-weight="500"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }

    function makeLabelIcon(type) {
      let src = '';
      let alt = '';

      if (type === 'new') {
        src = ICON_NEW;
        alt = 'NEW';
      } else if (type === 'best') {
        src = ICON_BEST;
        alt = 'BEST';
      } else if (type === 'rullet') {
        src = ICON_Rullet;
        alt = 'RULLET';
      } else {
        return '';
      }

      return `<img class="label-icon" src="${src}" alt="${alt}">`;
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, label, iconType = '']) => `
              <tr>
                <td class="num">${makeNumberSVG(num, numberVariant)}</td>
                <td class="label">
                  <div class="label-wrap">
                    <div class="label-text">${makeLabelSVG(label)}</div>
                    ${makeLabelIcon(iconType)}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}">
          <div class="page-title ${titleClass}">${title}</div>
          ${makeTable(rows, variant)}
        </div>`;
    }

    function makeSequenceHTML() { /*페이지 정리*/
      return `
        ${makePage('시그니처', 'title-pink', PAGE_1, 'pink', 'page-1')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('운동/벌칙', 'title-blue', PAGE_2, 'blue', 'page-2')}
        <div class="page-gap" aria-hidden="true"></div>
        ${makePage('미션', 'title-yellow', PAGE_3, 'yellow', 'page-3')}
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
</body>
</html>
