<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=400, height=1080, initial-scale=1.0" />
  <title> 팬더티비 단비 :::: (너비400, 높이1080) </title>
  <style>

    @font-face {
        font-family: 'IMCrisujin';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.3/ImcreSoojin.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'GMarketSans';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
        font-weight: 500;
        font-display: swap;
    }

    :root {
      --w: 400px;
      --h: 1080px;
      --row-gap: 4px;
      --icon-col: 30px;
      --num-col: 100px;
      --num-icon-size: 22px;
      --svg-h: 30px;
      --page-gap: 10px;
      --loop-seconds: 60s;
      --sequence-height: 1000px;
      --outline: 5;
      --scale: 1.0;

      /* ===== 고정 타이틀 영역 ===== */
      --fixed-title-h: 36px;
      --fixed-title-mb: 2px;
  
      /* ===== 고정 페이지 영역 ===== */
      --fixed-page-side-gap: 0px; /* ← 원하는 값 */
      --fixed-page-h: 0px;

      /* ===== 하단 고정바 제작자 영역 ===== */
      --fixed-bottom-h: 20px;
      --fixed-bottom-bottom: 4px;
      --fixed-bottom-mt: 0px;
    }


    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'IMCrisujin', 'GMarketSans', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
    }

    .fixed-title-wrap {
      position: absolute;
      left: 4px;
      top: 4px;
      width: calc(100% - 8px);
      height: var(--fixed-title-h);
      z-index: 10;
      pointer-events: none;
      background: transparent;
    }
    
    .viewport {
      position: absolute;
      left: 4px;
      top: calc(var(--fixed-title-h) + var(--fixed-title-mb));
      width: calc(100% - 8px);
      height: calc(
        100%
        - var(--fixed-title-h)
        - var(--fixed-title-mb)
        - var(--fixed-bottom-h)
        - var(--fixed-bottom-bottom)
        - var(--fixed-page-h)
      );
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: var(--page-gap);
      flex: 0 0 var(--page-gap);
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 0;
    }

    tbody tr:not(.footnote-row) td {
      padding-bottom: var(--row-gap);
    }

    .footnote-row td {
      padding-top: 0;
      padding-bottom: 2px;
    }


    col.num-col { width: var(--num-col); }
    col.icon-col { width: var(--icon-col); }

    td {
      padding-left: 2px;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      text-align: left;
    }

    .num-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      width: max-content;
      height: var(--svg-h);
    }

    .num-left-icon {
      padding-left: 2px;
      width: var(--num-icon-size);
      height: var(--num-icon-size);
      flex: 0 0 var(--num-icon-size);
      position: relative;
      top: -4px;
      object-fit: contain;
      display: block;
      margin: 0;

        /* 검정 외곽선 */
      filter:
        drop-shadow(0 0 1px #000)
        drop-shadow(1px 0 0 #000)
        drop-shadow(-1px 0 0 #000)
        drop-shadow(0 1px 0 #000)
        drop-shadow(0 -1px 0 #000);
    }

    td.label {
      padding-left: 4px;
    }

    td.icon-cell {
      width: 34px;
      text-align: left;
      vertical-align: middle;
    }

    td.footnote {
      padding: 0 0 0 6px;
      white-space: nowrap;
      line-height: 1;
    }

    .page-title {
      width: 240px;
      height: 36px;

      display: flex;
      align-items: center;       /* 세로 중앙 */
      justify-content: center;   /* 가로 중앙 */

      margin: 0 0 6px 0;
      text-align: center;

      font-family: 'IMCrisujin', 'GMarketSans', Arial, sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: #ffffff;

      border: 2px solid currentColor;
      border-radius: 10px;
      box-sizing: border-box;

      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
         
      transform: translateY(-1px);
    }

    .title-gray {
      background: #bfbfbf;
      border-color: #262525;
    }

    .title-pink {
      background: #FAB0C1;
      border-color: #D36C86;
    }

    .title-red {
      background: #ff3232;
      border-color: #ed1d1d;
    }

    .title-orange {
      background: #EF9573;
      border-color: #C96541;
    }

    .title-yellow {
      background: #FEFA94;
      border-color: #D4BE36;
    }

    .title-purple {
      background: #9656bd;
      border-color: #7727a8;
    }

    .title-blue {
      background: #4A90E2;
      border-color: #1F5EA6;
    }

    .title-green {
      background: #8acf6d;
      border-color: #4DAF2A;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: auto;
    }
    
    .num-svg,
    .label-svg,
    .footnote-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      object-fit: contain;
      display: block;
      margin-left: 12px; /* 텍스트와 아이콘 사이간격 */
    }

    .label-icon svg { width:100%; height:100%; }

    .label-text {
      flex: 0 0 auto;
      min-width: auto;
    }

    .fixed-bottom-label {
      position: absolute;
      left: 4px;
      bottom: var(--fixed-bottom-bottom);
      width: 245px;
      height: var(--fixed-bottom-h);

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'GMarketSans', Arial, sans-serif;
      font-size: 10px;
      font-weight: 100;
      color: #ffffff;

      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #ffffff;
      border-radius: 10px;

      box-sizing: border-box;
      z-index: 50;

      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000;
    }

/*    .page2 .label-svg text {
      font-size: 22px !important;
    }

    .page2 .num-svg text {
      font-size: 22px !important;
    }
*/

    .e-colorshift text {
      animation: colorShift 1.6s linear infinite;
    }

    @keyframes colorShift {
      0%   { fill: #ff6; }
      33%  { fill: #6ff; }
      66%  { fill: #f6f; }
      100% { fill: #ff6; }
    }

    @keyframes riseLoop {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(0, calc(-1 * var(--sequence-height)), 0);
      }
    }

    .fixed-bottom-page {
      position: absolute;
      left: var(--fixed-page-side-gap);
      bottom: calc(var(--fixed-bottom-h) + var(--fixed-bottom-bottom) + 0px);
      width: calc(85% - (var(--fixed-page-side-gap) * 1));  /* 고정 페이지 유리효과 가로 폭사이즈 */

      z-index: 40;

      padding: 4px 4px 4px 4px;

      border-radius: 14px;

      background: rgba(60, 60, 60, 0.35); /* 안정적인 값 */
      border: 1px solid rgba(255,255,255,0.4);
      box-sizing: border-box;
    }

    .fixed-bottom-page .page + .page {
      margin-top: 8px;
    }

    /* 지원되는 환경에서만 blur 적용 (스케일업할 경우 blur 2px 값 조정)*/
    @supports (backdrop-filter: blur(2px)) or (-webkit-backdrop-filter: blur(2px)) {
      .fixed-bottom-page {
        background: rgba(120, 120, 120, 0.18);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
    }
  }

    .waveChar {
      display: inline-block;
      animation: wave 1s ease-in-out infinite;
    }

    @keyframes wave {
      50% {
        transform: translateY(-6px);
      }
    }

    .content-scale {
      width: calc(100% / var(--scale));
      height: calc(100% / var(--scale));

      transform: scale(var(--scale));
      transform-origin: top left;
    }

  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="globalShadow"
              x="-30%"
              y="-30%"
              width="160%"
              height="160%">
        <feDropShadow
          dx="0"
          dy="0"
          stdDeviation="0.0"
          flood-color="#ffffff"
          flood-opacity="0"/>
      </filter>
    </defs>
  </svg>
  <div class="overlay">

    <div class="content-scale">

      <div class="fixed-title-wrap">
        <div class="page-title title-gray"> 단비네 차림표 </div>
      </div>

      <div class="viewport">
        <div class="track" id="track">
          <div class="sequence" id="sequenceA"></div>
          <div class="sequence" id="sequenceB" aria-hidden="true"></div>
        </div>
      </div>

      <div id="fixedPage" class="fixed-bottom-page"></div>

      <div class="fixed-bottom-label">
        Designed by 시프티™⭐
      </div>

    </div>

  </div>

  <script>
      /* =========================
        우클릭 / 개발자도구 차단
      ========================= */

      // 우클릭 차단
      document.addEventListener('contextmenu', e => {
        e.preventDefault();
      });

      // 드래그 선택 차단
      document.addEventListener('selectstart', e => {
        e.preventDefault();
      });

      // 드래그 차단
      document.addEventListener('dragstart', e => {
        e.preventDefault();
      });

      // 개발자도구 단축키 차단
      document.addEventListener('keydown', e => {

        // F12
        if (e.key === 'F12') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
          e.preventDefault();
          return false;
        }

        // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
          e.preventDefault();
          return false;
        }

        // Ctrl+U
        if (e.ctrlKey && e.key.toLowerCase() === 'u') {
          e.preventDefault();
          return false;
        }

        // Ctrl+S
        if (e.ctrlKey && e.key.toLowerCase() === 's') {
          e.preventDefault();
          return false;
        }

      });

    let PAGE_DATA = {};

    const FONT = 'IMCrisujin, GMarketSans, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
    const ICON_PUNG_P1 = 'https://i.imgur.com/qGz1W0y.png'; //프로필 (회색)
    const ICON_PUNG_P2 = 'https://i.imgur.com/D0ldyfG.png'; //시그/캠리 (주황)
    const ICON_PUNG_P3 = 'https://i.imgur.com/12lhyTv.png'; //라이브/의첸 (노랑)
    const ICON_PUNG_P4 = 'https://i.imgur.com/3i8eoNA.png'; //운동/벌칙(보라)
    const ICON_PUNG_P5 = 'https://i.imgur.com/2PvVhKn.png'; //미션 (빨강)
    const ICON_PUNG_P6 = 'https://i.imgur.com/cBt4rIi.png'; //!명령어 (파랑)
//  const ICON_PUNG_P7 = 'https://i.imgur.com/iMnnprr.png'; //유튜브 (검정)


    const PAGE_ICON_MAP = {
        'page1': ICON_PUNG_P1,
        'page2': ICON_PUNG_P2,
        'page3': ICON_PUNG_P3,
        'page4': ICON_PUNG_P4,
        'page5': ICON_PUNG_P5,
        'page6': ICON_PUNG_P6
//        'page7': ICON_PUNG_P7
    };

    let FIXED_PAGE_KEYS = [];
    let PAGE_ICON_ENABLED_MAP = {};
    // 고정 페이지 설정

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxKAgMiKOQI_iYbNGGKFoU0fQXaXMvaOdKsWADUWH7C0239KEIJoR1uU0KMeGrDCWquVw/exec';
    // GAS Ver 0.1 사용, 속도제어 기능 추가

    async function loadSheetData() {

      const res = await fetch(GAS_URL);

      const data = await res.json();

      /* =========================
        스크롤 속도 적용
      ========================= */

      const scrollSeconds = parseFloat(data.scrollSeconds);

      const safeScrollSeconds =
        !isNaN(scrollSeconds) && scrollSeconds > 0
          ? scrollSeconds
          : 60;

      document.documentElement.style.setProperty(
        '--loop-seconds',
        `${safeScrollSeconds}s`
      );
1
      /* =========================
        고정 페이지 처리
      ========================= */

      if (Array.isArray(data.fixedPages)) {
        FIXED_PAGE_KEYS = data.fixedPages;
      } else {
        FIXED_PAGE_KEYS = [];
      }

      /* =========================
        PAGE_ICON_MAP 좌측 이미지 ON/OFF
      ========================= */

      if (data.pageIconEnabled && typeof data.pageIconEnabled === 'object') {
        PAGE_ICON_ENABLED_MAP = data.pageIconEnabled;
      } else {
        PAGE_ICON_ENABLED_MAP = {};
      }

      /* =========================
        페이지 데이터
      ========================= */

      PAGE_DATA = Object.fromEntries(
        Object.entries(data.pages).filter(([_, pageObj]) =>
          pageObj.rows &&
          pageObj.rows.length > 0 &&
          pageObj.enabled !== false
        )
      );

    }

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    /* 컬러맵 */
    function getFillColor(variant = 'blue') {
      const COLOR_MAP = {
        gray: '#bfbfbf',
        pink: '#FAB0C1',
        orange: '#EF9573',
        yellow: '#FEFA94',
        blue: '#4A90E2',
        purple: '#DCAEF8',
        green: '#8acf6d',
        red: '#ff6b6b',
        white: '#ffffff',
        navy: '#5E4C9D',
        sky_blue: '#73FBFD'
      };

      return COLOR_MAP[variant] || COLOR_MAP.blue;
    }

    /* 단가 */
    function makeNumberSVG(num, variant = 'blue') {
      const width = numWidth(num.length);
      const t = esc(num);

      const fillColor = getFillColor(variant);

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          <g transform="scale(1.0 1)">
          <text x="10" y="21"
            text-anchor="start"
            font-family="${FONT}"
            font-size="28"
            font-weight="300"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#globalShadow)"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    const textWidthCache = {};

    function measureTextWidth(text, fontSize = 28, fontFamily = FONT, fontWeight = 300) {

      const key = `${text}_${fontSize}_${fontWeight}`;

      if (textWidthCache[key]) {
        return textWidthCache[key];
      }

      const canvas =
        measureTextWidth.canvas ||
        (measureTextWidth.canvas = document.createElement('canvas'));

      const ctx = canvas.getContext('2d');

      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;

      const width = Math.ceil(ctx.measureText(text).width);

      textWidthCache[key] = width;

      return width;
    }

    function makeLabelSVG(label, effect = '') {
      const t = esc(label);
      const measured = measureTextWidth(label, 28, FONT, 300);
      const w = Math.max(40, measured + 10);

      return `
        <svg
          class="label-svg ${effect === 'e_colorshift' || effect === 'e-colorshift' ? 'e-colorshift' : ''}"
          viewBox="0 0 ${w} 34"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="${t}"
          role="img"
          preserveAspectRatio="xMinYMid meet">

          <g transform="scale(1.0 1)">
            <text x="15" y="23"
              text-anchor="start"
              font-family="${FONT}"
              font-size="28"
              font-weight="300"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#globalShadow)"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }

    /* 각주 */
    function makeFootnoteSVG(footnote) {
      const t = esc(footnote);
      const measured = measureTextWidth(footnote, 20, FONT, 300);
      const w = Math.max(40, measured + 10);

      return `
        <svg class="footnote-svg" viewBox="0 0 ${w} 30"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          <g transform="scale(0.9 1)">
            <text x="120" y="8"
              text-anchor="start"
              font-family="${FONT}"
              font-size="22"
              font-weight="300"
              stroke="#000000"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#globalShadow)"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    /* 숫자 좌측 하트 이미지 */
    function makeNumberIcon(pageClass) {

      /*
        PAGE_ICON_ENABLED_MAP 값이 false이면 숨김.
        값이 없는 경우는 기존 HTML 호환을 위해 true로 처리.
      */
      const enabled = PAGE_ICON_ENABLED_MAP[pageClass] !== false;

      if (!enabled) {
        return '';
      }

      const src = PAGE_ICON_MAP[pageClass] || '';

      return src ? `<img class="num-left-icon" src="${src}" alt="풍">` : '';
    }
    /* 아이콘 SVG 이미지 내장*/

    const SVG_ICONS = {
      new: `
        <svg xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 724 512"
          shape-rendering="geometricPrecision"
          text-rendering="geometricPrecision"
          image-rendering="optimizeQuality"
          fill-rule="evenodd"
          clip-rule="evenodd"
          aria-hidden="true"
          focusable="false"
          preserveAspectRatio="xMidYMid meet">
        <g>
          <title>Layer 1</title>
          <g id="svg_1">

      }

      if (type === 'best') {
        return `<span class="label-icon" aria-label="BEST">${makeBestIconSVG()}</span>`;
      }

      if (type === 'rullet') {
        return `<span class="label-icon" aria-label="RULLET">${makeRulletIconSVG()}</span>`;
      }

      if (type === 'warning') {
        return `<span class="label-icon" aria-label="WARNING">${makeWarningIconSVG()}</span>`;
      }

      if (type === 'adult19') {
        return `<span class="label-icon" aria-label="19금">${makeAdult19IconSVG()}</span>`;
      }

      return '';
    }


    /* 테이블 */
    function makeTable(rows, pageClass = '') {
      const bodyHTML = rows.map(([num, label, iconType = '', footnote = '', effect = '', rowColor = 'blue']) => {
        const safeNum = String(num ?? '').trim();
        const safeLabel = String(label ?? '').trim();
        const safeFootnote = String(footnote ?? '').trim();

        const mainRow = `
          <tr>
            <td class="num">
              ${safeNum ? `<div class="num-wrap">${makeNumberIcon(pageClass)}${makeNumberSVG(safeNum, rowColor)}</div>` : ''}
            </td>
            <td class="label">
              <div class="label-wrap">
                <div class="label-text">${safeLabel ? makeLabelSVG(safeLabel, effect) : ''}</div>
                <div class="label-icon">${makeLabelIcon(iconType)}</div>
              </div>
            </td>
          </tr>`;

        const footnoteRow = safeFootnote
          ? `
          <tr class="footnote-row">
            <td class="footnote" colspan="3">${makeFootnoteSVG(safeFootnote)}</td>
          </tr>`
          : '';

        return mainRow + footnoteRow;
      }).join('');

      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
            <col class="icon-col" />
          </colgroup>
          <tbody>
            ${bodyHTML}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, pageClass) {
      return `
        <div class="page ${pageClass}" data-page="${pageClass}">
          <div class="page-title ${titleClass}">${title}</div>
          ${makeTable(rows, pageClass)}
        </div>`;
    }

    function makeSequenceHTML() {

      return Object.entries(PAGE_DATA)
        .map(([pageKey, pageObj]) => {

          /*
            CODE C6:N6 기준
            카테고리 분류 박스 색상
          */
          const titleColor = pageObj.titleColor || 'blue';

          return `
            ${makePage(
              pageObj.title,
              `title-${titleColor}`,
              pageObj.rows,
              pageKey
            )}
            <div class="page-gap" aria-hidden="true"></div>
          `;
        })
        .join('');
    }

    function extractFixedPage() {

      if (!FIXED_PAGE_KEYS.length) return;

      const fixedContainer = document.getElementById('fixedPage');

      let html = '';

      FIXED_PAGE_KEYS.forEach(pageKey => {

        const target = sequenceA.querySelector(
          `[data-page="${pageKey}"]`
        );

        if (!target) return;

        html += target.outerHTML;

        // 스크롤 영역에서 제거
        [sequenceA, sequenceB].forEach(seq => {

          const el = seq.querySelector(
            `[data-page="${pageKey}"]`
          );

          if (!el) return;

          const next = el.nextElementSibling;

          el.remove();

          if (next && next.classList.contains('page-gap')) {
            next.remove();
          }
        });

      });

      fixedContainer.innerHTML = html;
    }

    /* 추가 */
    function removeLeadingGap(seq) {

      const first = seq.firstElementChild;

      if (first && first.classList.contains('page-gap')) {
        first.remove();
      }
    }


    function applyWaveToFixedTitle() {

      if (!FIXED_PAGE_KEYS.length) return;

      const fixedContainer = document.getElementById('fixedPage');

      const titles = fixedContainer.querySelectorAll('.page-title');

      titles.forEach(titleEl => {

        const text = titleEl.textContent.trim();

        titleEl.innerHTML = Array.from(text).map((c, i) =>
          `<span class="waveChar"
            style="animation-delay:${i * 0.08}s">${c}</span>`
        ).join('');

      });
    }

    function adjustViewportHeight() {

      if (!FIXED_PAGE_KEYS.length) {
        document.documentElement.style.setProperty(
          '--fixed-page-h',
          '0px'
        );
        return;
      }

      const fixed = document.getElementById('fixedPage');

      const scale = getScale();

      const h =
        Math.ceil(
          fixed.getBoundingClientRect().height / scale
        ) + 12;

      document.documentElement.style.setProperty(
        '--fixed-page-h',
        `${h}px`
      );
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');
    
    async function init() {

      await loadSheetData();

      /* 웹폰트 로딩 완료 대기 */
      await document.fonts.ready;

      sequenceA.innerHTML = makeSequenceHTML();
      sequenceB.innerHTML = makeSequenceHTML();

      extractFixedPage();

      /* 추가 */
      removeLeadingGap(sequenceA);
      removeLeadingGap(sequenceB);

      const fixedPage = document.getElementById('fixedPage');

      if (FIXED_PAGE_KEYS.length) {
        fixedPage.style.display = 'block';
      } else {
        fixedPage.style.display = 'none';
      }

      applyWaveToFixedTitle();

      adjustViewportHeight();

      /* 렌더 완료 후 한번 더 보정 */
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          adjustViewportHeight();
          updateLoopHeight();
        });
      });
    }

    function getScale() {
      return parseFloat(
        getComputedStyle(document.documentElement)
          .getPropertyValue('--scale')
      ) || 1;
    }

    init();

    if (!FIXED_PAGE_KEYS.length) {
      document.getElementById('fixedPage').style.display = 'none';
    }

    function updateLoopHeight() {

      const scale = getScale();

      const h =
        sequenceA.getBoundingClientRect().height / scale;

      document.documentElement.style.setProperty(
        '--sequence-height',
        `${Math.ceil(h)}px`
      );
    }

      window.addEventListener('load', () => {
        updateLoopHeight();

        setTimeout(updateLoopHeight, 300);
        setTimeout(updateLoopHeight, 1000);
      });

  </script>
</body>
</html>
