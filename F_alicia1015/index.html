<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=380, height=1080, initial-scale=1.0" />
  <title>플렉스TV 우리 아 현🐤 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'KyoboHandwriting2019';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    @font-face {
      font-family: 'GmarketSansBold';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }    

    :root {
      --w: 380px;
      --h: 1080px;
      --row-gap: 14px;
      --num-col: 72px;
      --svg-h: 30px;
      --page-gap: 10px;     /*페이지사이공백*/
      --loop-seconds: 30s;  /*속도*/
      --sequence-height: 1000px;
      --outline: 5;
      --title-top-gap: 6px;
      --title-left-gap: 6px;

      /* ===== 고정 타이틀 영역 ===== */
      --fixed-title-h: 42px;  /* 타이틀이 차지하는 세로 영역 */
      --fixed-title-mb: 6px;  /* 타이틀과 리스트 사이 여백 */

      /* ===== 하단 고정 페이지 영역 ===== */
      --fixed-page-side-gap: 6px; /* ← 원하는 값 */      

      /* ===== 하단 고정바 영역 ===== */
      --fixed-bottom-h: 20px;
      --fixed-bottom-bottom: 4px;
      --fixed-bottom-mt: 0px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'KyoboHandwriting2019', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 4px 4px;
      overflow: hidden;
      background: transparent !important;
    }

    .fixed-title-wrap {
      position: absolute;
      top: var(--title-top-gap);
      left: var(--title-left-gap);
      width: 100%;
      height: var(--fixed-title-h);
      z-index: 10;
      pointer-events: none;
      background: transparent;
    }

    .viewport {
      position: absolute;
      left: 4px;
      top: calc(var(--fixed-title-h) + var(--fixed-title-mb));
      width: 100%;
      height: calc(
        100%
        - var(--fixed-title-h)
        - var(--fixed-title-mb)
        - var(--fixed-bottom-h)
        - var(--fixed-bottom-bottom)
        - var(--fixed-bottom-mt)
      );
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      will-change: transform;
      animation: riseLoop var(--loop-seconds) linear infinite;
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 32px;
      flex: 0 0 32px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num {
      display: grid;
      place-items: center;
    }

    td.label {
      padding-left: 4px;
    }

    .page-title {
      width: 200px;
      height: 36px;

      display: flex;
      align-items: center;       /* 세로 중앙 */
      justify-content: center;   /* 가로 중앙 */

      margin: 0;
      text-align: center;

      font-family: 'KyoboHandwriting2019', Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;

      border: 2px solid currentColor;
      border-radius: 10px;
      box-sizing: border-box;

      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .title-pink {
      background: #F4AAE4;
      border-color: #000000;
    }

    .title-blue {
      background: #8fd0ff;
    }

    .title-blue2 {
      background: #99ccfe;
    }

    .title-purple {
      background: #7643b5;
    }    

    .title-yellow {
      background: #F6E58D;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0px;
      width: auto;
    }

    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .label-icon {
      position: static;
      width: 50px;
      height: 30px;
      flex: 0 0 26px;
      object-fit: contain;
      display: block;
      margin-left: 5px; /* 더 붙이고 싶으면 -3px ~ -6px 정도 조절 */
    }

    .label-text {
      display: flex;
      align-items: center;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: auto;
      height: var(--svg-h);
      overflow: visible;
    }

    .fixed-bottom-label {
      position: absolute;
      left: 4px;
      bottom: var(--fixed-bottom-bottom);
      width: 200px;
      height: var(--fixed-bottom-h);

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'GmarketSansBold', Arial, sans-serif;
      font-size: 10px;
      font-weight: 100;
      color: #ffffff;

      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #ffffff;
      border-radius: 10px;

      box-sizing: border-box;
      z-index: 50;

      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px  2px 0 #000,
        2px  2px 0 #000;
    }

    .page-2 .label-svg text {
      font-size: 28px !important;
    }

    .page-2 .num-svg text {
      font-size: 28px !important;
    }

    .fixed-bottom-page {
      position: absolute;
      left: var(--fixed-page-side-gap);
      bottom: calc(var(--fixed-bottom-h) + var(--fixed-bottom-bottom) + 0px);
      width: calc(60% - (var(--fixed-page-side-gap) * 2));

      z-index: 40;

      padding: 4px 4px 6px 4px;

      border-radius: 14px;

      background: rgba(60, 60, 60, 0.35); /* 안정적인 값 */
      border: 1px solid rgba(255,255,255,0.4);
      box-sizing: border-box;
    }

    /* 지원되는 환경에서만 blur 적용 */
    @supports (backdrop-filter: blur(2px)) or (-webkit-backdrop-filter: blur(2px)) {
      .fixed-bottom-page {
        background: rgba(120, 120, 120, 0.18);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
    }

    @keyframes riseLoop {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--sequence-height)));
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <!-- 타이틀은 스크롤 트랙 밖에 배치해서 항상 상단에 고정 -->
    <div class="fixed-title-wrap">
      <div class="page-title title-blue"> 우리 아 현🐤 </div>
    </div>

    <!-- 숫자 / 텍스트 / 아이콘만 이 영역 안에서 무한 순환 -->
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
        <div class="sequence" id="sequenceB" aria-hidden="true"></div>
      </div>
    </div>
    <div class="fixed-bottom-page" id="fixedPage"></div>
    <div class="fixed-bottom-label">designed by 시프티♻️</div>
  </div>

  <script>
    const PAGE_1 = [
      ['32','현이개'],
      ['55','킹받쥬'],
      ['100','니코니코니'],
      ['115','팬서비스'],
      ['118','캐치캐치'],
      ['151','이머전시'],
      ['122','나니가스키'],
      ['123','홀드업'],
      ['124','파티트레인'],
      ['125','러브쉐이크'],
      ['126','귀여워서미안해'],
      ['127','핫해'],
      ['133','외모체크'],
      ['135','마니마니'],
      ['142','LSD'],
      ['143','스마트'],
      ['144','나랑사귈래'],
      ['148','이게사랑이지'],
      ['149','핑크레이디'],
      ['155','제로투'],
      ['161','벌룬인러브'],
      ['171','왜요왜요'],
      ['202','큐티스트리트'],
      ['208','킥드베'],
      ['212','뱅뱅'],
      ['230','간바레'],
      ['257','터미널'],
      ['288','바우치'],
      ['335','빛을따라서'],
      ['355','대추노노'],
      ['383','스텝'],
      ['454','겐또'],
      ['532','신호탄']
    ];

    const PAGE_2 = [
      ['92','역도'],
      ['97','스키']
    ];

    const PAGE_3 = [
      ["1등","식데"],
      ["2등","카톡"],
      ["3등","방셀"],
      ["4등","다시뽑기"],
      ["5등","꽝"]
    ];

    const FIXED_PAGE_KEY = 'page-3'; 
    // 'page-1', 'page-2', 'page-3', 'page-4' 로 변경 가능    

    const FONT = 'KyoboHandwriting2019, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;
    const ICON_NEW = 'https://i.imgur.com/rnoY6bd.png';
    const ICON_BEST = 'https://i.imgur.com/fa0W5J9.png';
    const ICON_Rullet = 'https://i.imgur.com/BfBWx6n.png';

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeShadowFilter(id) {
      return `
        <defs>
          <filter id="${id}" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="1" dy="1" stdDeviation="3.2" flood-color="#ffffff" flood-opacity="0.9"/>
          </filter>
        </defs>`;
    }

    const FIXED_NUM_WIDTH = parseInt(
      getComputedStyle(document.documentElement)
        .getPropertyValue('--num-col')
    );

    /* 단가 */
    function makeNumberSVG(num, variant = 'blue') {
      const width = FIXED_NUM_WIDTH;
      const cx = width / 2;
      const t = esc(num);
      const filterId = `numShadow-${variant}-${t}-${Math.random().toString(36).slice(2, 9)}`;

      /* 글꼴색 */
      const fillColor =
        variant === 'blue' ? '#8fd0ff' :
        variant === 'blue2' ? '#99ccfe' :
        variant === 'yellow' ? '#F6E58D' :
        '#FDA6E8';

      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
          <text x="${cx}" y="25"
            text-anchor="middle"
            font-family="${FONT}"
            font-size="36"
            font-weight="500"
            stroke="#000000"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            filter="url(#${filterId})"
            fill="${fillColor}">${t}</text>
          </g>
        </svg>`;
    }
    /* 텍스트 */
    function measureTextWidth(text, fontSize = 36, fontFamily = FONT, fontWeight = 500) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      return Math.ceil(ctx.measureText(text).width);
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      const measured = measureTextWidth(label, 36, FONT, 500);
      const w = Math.max(40, measured + 10); // 여백 10 정도
      const filterId = `labelShadow-${t}-${Math.random().toString(36).slice(2, 9)}`;

      return `
        <svg class="label-svg" viewBox="0 0 ${w} 34"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="${t}" role="img"
            preserveAspectRatio="xMinYMid meet">
          ${makeShadowFilter(filterId)}
          <g transform="scale(1.0 1)">
            <text x="4" y="26"
              text-anchor="start"
              font-family="${FONT}"
              font-size="36"
              font-weight="500"
              stroke="#26080B"
              stroke-width="${STROKE}"
              stroke-linejoin="round"
              paint-order="stroke fill"
              filter="url(#${filterId})"
              fill="#ffffff">${t}</text>
          </g>
        </svg>`;
    }
    function makeLabelIcon(type) {
      let src = '';
      let alt = '';

      if (type === 'new') {
        src = ICON_NEW;
        alt = 'NEW';
      } else if (type === 'best') {
        src = ICON_BEST;
        alt = 'BEST';
      } else if (type === 'rullet') {
        src = ICON_Rullet;
        alt = 'RULLET';
      } else {
        return '';
      }

      return `<img class="label-icon" src="${src}" alt="${alt}">`;
    }

    /* 테이블 */
    function makeTable(rows, numberVariant = 'pink') {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, label, iconType = '']) => `
              <tr>
                <td class="num">${makeNumberSVG(num, numberVariant)}</td>
                <td class="label">
                  <div class="label-wrap">
                    <div class="label-text">${makeLabelSVG(label)}</div>
                    ${makeLabelIcon(iconType)}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makePage(title, titleClass, rows, variant, pageClass) {
      return `
        <div class="page ${pageClass}" data-page="${pageClass}">
          <div class="page-title ${titleClass}">${title}</div>
          ${makeTable(rows, variant)}
        </div>
      `;
    }

    function makeSequenceHTML() { 
      return `
        ${makePage('시그니처', 'title-blue', PAGE_1, 'blue', 'page-1')}
        <div class="page-gap" aria-hidden="true"> </div>
        ${makePage('운동', 'title-blue', PAGE_2, 'blue', 'page-2')}
        <div class="page-gap" aria-hidden="true"> </div>
        ${makePage('100개 뽑기', 'title-blue2', PAGE_3, 'blue2', 'page-3')}
        <div class="page-gap" aria-hidden="true"> </div>
      `;
    }

    function extractFixedPage() {
      const fixedContainer = document.getElementById('fixedPage');

      // sequenceA 기준으로 찾기
      const target = sequenceA.querySelector(`[data-page="${FIXED_PAGE_KEY}"]`);

      if (!target) return;

      // 복제해서 고정 영역으로 이동
      fixedContainer.innerHTML = target.outerHTML;

      // 스크롤에서 제거 (A/B 둘 다 제거)
      [sequenceA, sequenceB].forEach(seq => {
        const el = seq.querySelector(`[data-page="${FIXED_PAGE_KEY}"]`);
        if (!el) return;

        const next = el.nextElementSibling;

        el.remove();

        // 바로 다음이 gap이면 그것만 제거
        if (next && next.classList.contains('page-gap')) {
          next.remove();
        }
      });
    }

    function adjustViewportHeight() {
      const fixed = document.getElementById('fixedPage');
      const vh = document.querySelector('.viewport');

      const h = fixed.offsetHeight || 0;

      vh.style.height = `calc(
        100%
        - var(--fixed-title-h)
        - var(--fixed-title-mb)
        - var(--fixed-bottom-h)
        - var(--fixed-bottom-bottom)
        - ${h}px
      )`;
    }

    const sequenceA = document.getElementById('sequenceA');
    const sequenceB = document.getElementById('sequenceB');

    sequenceA.innerHTML = makeSequenceHTML();
    sequenceB.innerHTML = makeSequenceHTML();

    extractFixedPage();   // 하단 고정페이지 렌더링
    adjustViewportHeight();   // 하단 페이지 고정으로 인한 렌더링 위치 자동계산    

    function updateLoopHeight() {
      const h = sequenceA.offsetHeight;
      document.documentElement.style.setProperty('--sequence-height', `${h}px`);
    }

    updateLoopHeight();
    window.addEventListener('load', updateLoopHeight);
    window.addEventListener('resize', updateLoopHeight);
  </script>
</body>
</html>
