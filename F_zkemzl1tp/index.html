<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=400, height=800, initial-scale=1.0" />
  <title>플렉스TV 소디 리액션 리스트</title>
  <style>

    @font-face {
        font-family: 'Presentation';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-6SemiBold.woff2') format('woff2');
        font-weight: 600;
        font-display: swap;
    }

    :root {
      --w: 400px;
      --h: 800px;
      --row-gap: 10px;
      --num-col: 72px;
      --emoji-col: 34px;
      --svg-h: 30px;
      --page-gap: 28px;     /*페이지사이공백*/
      --emoji-color: #ff3d73;
      --outline: 5;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'Presentation', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background: transparent !important;
    }

    .overlay {
      position: relative;
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      padding: 10px 8px;
      overflow: hidden;
      background: transparent !important;
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .track {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      transform: translateY(0);
    }

    .sequence {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page {
      width: 100%;
    }

    .page-gap {
      width: 100%;
      height: 36px;
      flex: 0 0 36px;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0 var(--row-gap);
    }

    col.num-col { width: var(--num-col); }
    col.emoji-col { width: var(--emoji-col); }

    td {
      padding: 0;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1;
    }

    td.num,
    td.emoji {
      text-align: center;
    }

    td.label {
      padding-left: 4px;
    }

    .num-svg,
    .label-svg {
      display: block;
      width: 100%;
      height: var(--svg-h);
      overflow: visible;
    }

    .emoji {
      font-size: 30px;
      color: var(--emoji-color);
      font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    .emoji-svg {
      display: block;
      width: 30px;
      height: 30px;
      margin: 0 auto;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="viewport">
      <div class="track" id="track">
        <div class="sequence" id="sequenceA"></div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_1 = [
      ["10","💗","와라와라왕"],
      ["14","💗","분무기1"],
      ["15","💗","숟딱1"],
      ["20","💗","뺨1"],
      ["30","💗","얼음30초"],
      ["48","💗","오벽"],
      ["52","💗","랜덤춤(재미)"],
      ["60","💗","얼낙(1글자1시간)"],
      ["300","💗","괴짜가족"],
      ["500","💗","최첨단 움짤방셀"],
      ["555","💗","연장30분"],
      ["1414","💗","식사식사"],
      ["1818","💗","108배(Max1)"],
      ["2525","💗","술먹방"]
    ];
/*
    const PAGE_2 = [      
      ["110","💗","제로투"],
      ["111","💗","간바레 센빠이"],
      ["121","💗","고민중독"],
      ["122","💗","핫해"],
      ["123","💗","체온"],
      ["124","💗","나랑사귈래"],
      ["125","💗","우유"],
      ["126","💗","팬서비스"],
      ["127","💗","롤린"],
      ["130","💗","색소폰 매직"],
      ["133","💗","무아"],
      ["135","💗","자기야 화풀어"],
      ["144","💗","L.S.D"],
      ["155","💗","버터컵"],
      ["158","💗","오빠달려붕붕"],
      ["160","💗","마티니"],
      ["202","💗","코카인"],
      ["203","💗","다이스키"],
      ["205","💗","터미널"],
      ["206","💗","앙카"],
      ["210","💗","계엄령"],
      ["269","💗","이쿠욧"],
      ["295","💗","모또모또"],
      ["333","💗","드라군"],
      ["740","💗","연장"],
      ["750","💗","단축"],
      ["1414","💗","밥묵으라"],
      ["1415","💗","밥먹지마"]
    ];
*/
    const FONT = 'Presentation, Arial, sans-serif';
    const STROKE = getComputedStyle(document.documentElement)
      .getPropertyValue('--outline')
      .trim() || 5;

    function esc(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function numWidth(len) {
      if (len >= 4) return 92;
      if (len === 3) return 76;
      return 58;
    }

    function makeEmojiSVG() {
      return `
        <svg class="emoji-svg" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <filter id="emojiOutline" x="-50%" y="-50%" width="200%" height="200%">
              <feMorphology in="SourceAlpha" operator="dilate" radius="1.8" result="thicken"/>
              <feFlood flood-color="#000000" result="outlineColor"/>
              <feComposite in="outlineColor" in2="thicken" operator="in" result="outline"/>
              <feMerge>
                <feMergeNode in="outline"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <image
            href="https://www.flextv.co.kr/icon/ico_flex.svg"
            x="0"
            y="0"
            width="24"
            height="24"
            filter="url(#emojiOutline)"
            preserveAspectRatio="xMidYMid meet"
          />
        </svg>`;
    }

    function makeNumberSVG(num) {
      const width = numWidth(num.length);
      const cx = width / 2;
      const t = esc(num);
      const gid = `grad-${t}-${Math.random().toString(36).slice(2, 9)}`;
      return `
        <svg class="num-svg" viewBox="0 0 ${width} 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img">
          <defs>
            <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FFFFFF"/>
              <stop offset="30%" stop-color="#FFFFFF"/>
              <stop offset="65%" stop-color="#FFFFFF"/>
              <stop offset="100%" stop-color="#FFFFFF"/>
            </linearGradient>
          </defs>
          <text x="${cx}" y="25"
            text-anchor="middle"
            font-family="${FONT}"
            font-size="36"
            font-weight="700"
            stroke="#8c06aa"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            fill="url(#${gid})">${t}</text>
        </svg>`;
    }

    function makeLabelSVG(label) {
      const t = esc(label);
      return `
        <svg class="label-svg" viewBox="0 0 172 34" xmlns="http://www.w3.org/2000/svg" aria-label="${t}" role="img" preserveAspectRatio="xMinYMid meet">
          <text x="4" y="25"
            text-anchor="start"
            font-family="${FONT}"
            font-size="36"
            font-weight="700"
            stroke="#bf15b7"
            stroke-width="${STROKE}"
            stroke-linejoin="round"
            paint-order="stroke fill"
            fill="#FFFFFF">${t}</text>
        </svg>`;
    }

    function makeTable(rows) {
      return `
        <table aria-label="리액션 리스트">
          <colgroup>
            <col class="num-col" />
            <col class="emoji-col" />
            <col />
          </colgroup>
          <tbody>
            ${rows.map(([num, emoji, label]) => `
              <tr>
                <td class="num">${makeNumberSVG(num)}</td>
                <td class="emoji">${makeEmojiSVG()}</td>
                <td class="label">${makeLabelSVG(label)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function makeSequenceHTML() {
      return `
        <div class="page page-1">${makeTable(PAGE_1)}</div>
        <div class="page-gap" aria-hidden="true"></div>
      `;
    }

    const sequenceA = document.getElementById('sequenceA');
    sequenceA.innerHTML = makeSequenceHTML();
  </script>
</body>
</html>
