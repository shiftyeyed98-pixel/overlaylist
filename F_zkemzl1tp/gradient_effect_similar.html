<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>유사 그라데이션 효과</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .gradient-box {
    width: 200px;
    height: 150px;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(
        105deg,
        #fff900 0%,
        #eaff00 9%,
        #87ff45 20%,
        #19ffd4 38%,
        #20f7ef 55%,
        #36d9ff 67%,
        #9b6dff 80%,
        #ff00e6 100%
      );
  }

  .gradient-box::before {
    content: "";
    position: absolute;
    inset: -20px;
    background:
      linear-gradient(
        105deg,
        rgba(255, 255, 0, 0.85) 0%,
        rgba(70, 255, 110, 0.55) 22%,
        rgba(0, 255, 230, 0.55) 45%,
        rgba(60, 210, 255, 0.45) 65%,
        rgba(180, 80, 255, 0.55) 82%,
        rgba(255, 0, 220, 0.85) 100%
      );
    filter: blur(14px);
    opacity: 0.9;
  }

  /* 화면 전체에 꽉 채우고 싶으면 아래 주석을 해제하면 됩니다. */
  /*
  .gradient-box {
    width: 100vw;
    height: 100vh;
  }
  */

  /* 움직이는 그라데이션이 필요하면 아래 주석을 해제하면 됩니다. */
  /*
  .gradient-box {
    background-size: 180% 180%;
    animation: gradientMove 6s ease-in-out infinite alternate;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }
  */
</style>
</head>
<body>
  <div class="gradient-box"></div>
</body>
</html>
